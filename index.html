<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RANGE — Functional Training</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d1025">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RANGE">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-check-compat.js"></script>
  
<!-- SheetJS for xlsx parsing -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d1025;--bg2:#151938;--bg3:#1c2148;--bg4:#272d5a;
  --accent:#8b9cf7;--accent2:#6b7ee0;--accentBright:#a4b3ff;
  --text:#e8eaf6;--text2:#8e93b8;--text3:#5a5f82;
  --green:#4ade80;--red:#f87171;--orange:#fb923c;
  --radius:14px;
  --groupA:#8b9cf7;--groupB:#c084fc;--groupC:#67e8f9;
}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;-webkit-tap-highlight-color:transparent}
input,button,select,textarea{font-family:inherit;font-size:inherit}
.app{max-width:500px;margin:0 auto;min-height:100vh;min-height:100dvh;padding-bottom:80px}

/* NAV */
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--bg4);display:flex;justify-content:center;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-inner{display:flex;max-width:500px;width:100%}
.nav-btn{flex:1;padding:10px 0 8px;text-align:center;color:var(--text3);font-size:11px;font-weight:500;cursor:pointer;border:none;background:none;transition:.15s}
.nav-btn.active{color:var(--accent)}
.nav-btn svg{display:block;margin:0 auto 3px;width:22px;height:22px}

/* HEADER */
.header{padding:16px 20px 8px;display:flex;align-items:center;gap:12px}
.logo-img{width:42px;height:42px;border-radius:50%;object-fit:cover;border:2px solid var(--bg4)}
.logo-text{font-size:24px;font-weight:900;letter-spacing:3px;color:var(--accentBright)}
.logo-sub{font-size:10px;color:var(--text3);letter-spacing:2px;font-weight:500}
.back-btn{background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;padding:4px 8px}

/* LOGIN */
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh;padding:40px 20px;text-align:center}
.login-logo{width:120px;height:120px;border-radius:50%;object-fit:cover;margin-bottom:24px;border:3px solid var(--bg4)}
.login-title{font-size:42px;font-weight:900;letter-spacing:6px;color:var(--accentBright);margin-bottom:4px}
.login-sub{font-size:13px;color:var(--text3);letter-spacing:3px;margin-bottom:48px}
.google-btn{display:flex;align-items:center;gap:12px;background:#fff;color:#333;border:none;border-radius:50px;padding:14px 32px;font-size:16px;font-weight:600;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.3);transition:.15s}
.google-btn:active{transform:scale(.97)}
.google-btn svg{width:20px;height:20px}

/* LOADING */
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh;gap:16px;color:var(--text2)}
.spinner{width:36px;height:36px;border:3px solid var(--bg4);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* SECTIONS */
.section-title{font-size:12px;color:var(--text3);font-weight:600;margin:16px 20px 8px;letter-spacing:1.5px;text-transform:uppercase}
.chips{display:flex;gap:8px;flex-wrap:wrap;padding:0 16px;margin-top:8px}
.chip{padding:10px 18px;border-radius:50px;background:var(--bg3);font-size:14px;font-weight:600;cursor:pointer;border:2px solid transparent;color:var(--text2);transition:.15s}
.chip:active{transform:scale(.96)}
.chip.active{border-color:var(--accent);background:rgba(139,156,247,.1);color:var(--accent)}

/* WORKOUT TYPE GRID */
.wt-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px;margin-top:12px}
.wt-card{background:var(--bg2);border-radius:var(--radius);padding:18px 10px;text-align:center;cursor:pointer;border:2px solid var(--bg4);transition:.15s}
.wt-card:active{transform:scale(.97)}
.wt-card.active{border-color:var(--accent);background:rgba(139,156,247,.08)}
.wt-icon{font-size:26px;margin-bottom:4px}
.wt-name{font-size:14px;font-weight:700}
.wt-count{font-size:11px;color:var(--text3);margin-top:4px}

/* LOCATION TOGGLE */
.loc-toggle{display:flex;margin:16px 16px 0;border-radius:50px;overflow:hidden;background:var(--bg3);border:1px solid var(--bg4)}
.loc-btn{flex:1;padding:11px;text-align:center;font-size:14px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--text3);transition:.15s}
.loc-btn.active{background:var(--accent2);color:#fff}

/* DATE PICKER */
.date-bar{display:flex;align-items:center;gap:10px;padding:12px 16px;margin-top:8px}
.date-bar label{font-size:13px;color:var(--text2);font-weight:600;white-space:nowrap}
.date-input{flex:1;background:var(--bg3);border:1px solid var(--bg4);border-radius:10px;padding:10px 14px;color:var(--text);font-size:15px;text-align:center;outline:none;-webkit-appearance:none;transition:.15s}
.date-input:focus{border-color:var(--accent)}
.today-btn{background:var(--accent2);color:#fff;border:none;border-radius:10px;padding:10px 16px;font-size:13px;font-weight:600;cursor:pointer}
.today-btn:active{transform:scale(.96)}

/* SUPERSET GROUPS */
.group-label{display:flex;align-items:center;gap:8px;padding:14px 20px 4px}
.group-badge{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--bg)}
.group-badge.a{background:var(--groupA)}.group-badge.b{background:var(--groupB)}.group-badge.c{background:var(--groupC)}
.group-text{font-size:12px;color:var(--text3);font-weight:600}
.group-line{flex:1;height:1px;background:var(--bg4)}

/* EXERCISE CARDS */
.ex-card{background:var(--bg2);border-radius:var(--radius);margin:6px 16px;overflow:hidden;border:1px solid var(--bg4)}
.ex-card.ga{border-right:3px solid var(--groupA)}.ex-card.gb{border-right:3px solid var(--groupB)}.ex-card.gc{border-right:3px solid var(--groupC)}
.ex-header{padding:14px 16px;display:flex;align-items:flex-start;gap:10px;cursor:pointer}
.ex-num{min-width:26px;height:26px;border-radius:8px;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--accent);flex-shrink:0}
.ex-name{flex:1;font-size:14px;font-weight:600;line-height:1.5}
.ex-chevron{color:var(--text3);font-size:18px;flex-shrink:0}

/* SETS */
.sets-area{padding:0 12px 12px;border-top:1px solid var(--bg4)}
.sets-header{display:flex;gap:6px;margin:8px 0 2px}
.sets-header-label{font-size:10px;color:var(--text3);font-weight:600;text-align:center;text-transform:uppercase;letter-spacing:.5px}
.set-row{display:flex;align-items:center;gap:6px;margin-top:6px}
.set-label{min-width:20px;font-size:12px;color:var(--text3);font-weight:600;text-align:center}
.set-input{flex:1;min-width:0;background:var(--bg3);border:1px solid var(--bg4);border-radius:9px;padding:8px 8px;color:var(--text);font-size:15px;text-align:center;outline:none;-webkit-appearance:none;transition:.15s}
.set-input:focus{border-color:var(--accent)}
.set-notes-row{display:flex;margin-top:4px;padding-right:26px;padding-left:30px;gap:6px}
.set-notes{flex:1;min-width:0;background:var(--bg3);border:1px solid transparent;border-radius:8px;padding:6px 9px;color:var(--text2);font-size:12px;outline:none;transition:.15s}
.set-notes:focus{border-color:var(--accent);color:var(--text)}
.set-notes::placeholder{color:var(--text3)}
.set-del{background:none;border:none;color:var(--text3);font-size:15px;cursor:pointer;padding:4px;width:24px;flex-shrink:0;transition:.15s}
.set-del:active{color:var(--red)}
.add-set-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:10px;margin-top:10px;background:var(--bg3);border:1px dashed var(--bg4);border-radius:10px;color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;transition:.15s}
.add-set-btn:active{background:var(--bg4);border-color:var(--accent)}

/* SAVE BAR */
.save-bar{position:fixed;bottom:60px;left:0;right:0;padding:10px 16px;z-index:99}
.save-bar-inner{max-width:500px;margin:0 auto}
.save-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff;border:none;border-radius:50px;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 4px 24px rgba(107,126,224,.3);letter-spacing:1px}
.save-btn:active{transform:scale(.97)}
.save-btn:disabled{opacity:.5;cursor:not-allowed}
.save-status{font-size:13px;font-weight:700;white-space:nowrap}

/* CARDIO */
.cardio-toggle{display:flex;margin:16px 16px 0;border-radius:50px;overflow:hidden;background:var(--bg3);border:1px solid var(--bg4)}
.cardio-toggle-btn{flex:1;padding:11px;text-align:center;font-size:14px;font-weight:700;cursor:pointer;border:none;background:transparent;color:var(--text3);transition:.15s;letter-spacing:1px}
.cardio-toggle-btn.active{background:var(--accent2);color:#fff}
.cardio-time-row{display:flex;gap:10px;padding:0 16px;margin-top:14px}
.cardio-time-box{flex:1;background:var(--bg2);border:1px solid var(--bg4);border-radius:var(--radius);padding:12px;text-align:center}
.cardio-time-label{font-size:11px;color:var(--text3);font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.cardio-time-input{width:100%;background:var(--bg3);border:1px solid var(--bg4);border-radius:10px;padding:10px;color:var(--text);font-size:16px;text-align:center;outline:none;-webkit-appearance:none}
.cardio-time-input:focus{border-color:var(--accent)}
.cardio-ex-list{margin:12px 16px;background:var(--bg2);border-radius:var(--radius);border:1px solid var(--bg4);overflow:hidden}
.cardio-ex-item{padding:14px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--bg4)}
.cardio-ex-item:last-child{border-bottom:none}
.cardio-notes-wrap{padding:0 16px;margin-top:10px}
.cardio-notes-input{width:100%;background:var(--bg2);border:1px solid var(--bg4);border-radius:var(--radius);padding:12px 14px;color:var(--text);font-size:14px;outline:none;min-height:60px;resize:none}
.cardio-notes-input:focus{border-color:var(--accent)}
.cardio-notes-input::placeholder{color:var(--text3)}

/* HISTORY */
.hist-card{background:var(--bg2);border-radius:var(--radius);padding:14px 16px;margin:8px 16px;border:1px solid var(--bg4);position:relative}
.hist-date{font-size:13px;color:var(--accent);font-weight:600}
.hist-info{font-size:14px;font-weight:600;margin-top:4px}
.hist-detail{font-size:12px;color:var(--text2);margin-top:6px;line-height:1.6}
.hist-note{font-style:italic;color:var(--text3);font-size:11px}
.hist-del{position:absolute;top:12px;left:12px;background:none;border:none;color:var(--text3);font-size:14px;cursor:pointer;padding:4px}
.hist-del:active{color:var(--red)}

/* PEAK */
.peak-badge{display:inline-block;background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff;font-size:10px;font-weight:800;padding:3px 10px;border-radius:50px;margin-right:8px;letter-spacing:1px}

/* RIR INPUT — compact */
.rir-badge{display:inline-block;background:rgba(139,156,247,.15);color:var(--accent);font-size:10px;font-weight:700;padding:2px 8px;border-radius:50px;margin-right:6px}
.ex-meta{font-size:11px;color:var(--text3);margin-top:2px;line-height:1.4}

/* ADMIN */
.admin-section{padding:16px}
.admin-card{background:var(--bg2);border-radius:var(--radius);padding:16px;margin-bottom:12px;border:1px solid var(--bg4)}
.admin-card h3{font-size:15px;font-weight:700;margin-bottom:8px;color:var(--accent)}
.admin-card p{font-size:12px;color:var(--text2);line-height:1.6}
.file-upload{display:flex;flex-direction:column;gap:10px;margin-top:12px}
.file-upload-btn{background:var(--bg3);border:2px dashed var(--bg4);border-radius:var(--radius);padding:20px;text-align:center;cursor:pointer;color:var(--text2);font-size:14px;font-weight:600;transition:.15s}
.file-upload-btn:active{border-color:var(--accent)}
.file-upload-btn.has-file{border-color:var(--green);color:var(--green)}
input[type="file"]{display:none}
.upload-submit{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff;border:none;border-radius:50px;padding:12px 24px;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:1px}
.upload-submit:disabled{opacity:.4;cursor:not-allowed}

.user-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bg4)}
.user-row:last-child{border-bottom:none}
.user-avatar{width:32px;height:32px;border-radius:50%;background:var(--bg4)}
.user-info{flex:1}
.user-name{font-size:13px;font-weight:600}
.user-email{font-size:11px;color:var(--text3)}
.user-badge{font-size:10px;padding:3px 10px;border-radius:50px;font-weight:700}
.user-badge.admin{background:rgba(139,156,247,.15);color:var(--accent)}
.user-badge.trainee{background:rgba(74,222,128,.1);color:var(--green)}

/* MISC */
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-icon{font-size:48px;margin-bottom:12px}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--green);color:var(--bg);padding:10px 24px;border-radius:50px;font-size:14px;font-weight:600;z-index:200;animation:fadeInOut 2.5s ease;pointer-events:none;white-space:nowrap}
.toast.error{background:var(--red)}
@keyframes fadeInOut{0%{opacity:0;transform:translateX(-50%) translateY(-10px)}15%{opacity:1;transform:translateX(-50%) translateY(0)}80%{opacity:1}100%{opacity:0;transform:translateX(-50%) translateY(-10px)}}

.danger-btn{background:none;border:1px solid var(--red);color:var(--red);padding:10px 20px;border-radius:50px;font-size:13px;font-weight:600;cursor:pointer;margin:12px 16px}
.danger-btn:active{background:rgba(248,113,113,.1)}

.storage-info{padding:12px 16px;margin:8px 16px;background:var(--bg3);border-radius:var(--radius);font-size:12px;color:var(--text2);line-height:1.6}
.storage-info strong{color:var(--text)}

.cycle-card{background:var(--bg2);border-radius:var(--radius);padding:14px 16px;margin:8px 16px;border:1px solid var(--bg4);display:flex;align-items:center;justify-content:space-between}
.cycle-card .cycle-name{font-size:15px;font-weight:700}
.cycle-card .cycle-meta{font-size:11px;color:var(--text3);margin-top:2px}
.cycle-del{background:none;border:none;color:var(--text3);font-size:16px;cursor:pointer;padding:8px}
.cycle-del:active{color:var(--red)}

.saving-overlay{position:fixed;inset:0;background:rgba(13,16,37,.8);display:flex;align-items:center;justify-content:center;z-index:300;flex-direction:column;gap:16px}

/* CYCLE EDITOR */
.editor-week{margin:12px 16px}
.editor-week-title{font-size:14px;font-weight:700;padding:10px 0;color:var(--accent);display:flex;align-items:center;gap:8px;cursor:pointer}
.editor-type{margin:6px 0;background:var(--bg2);border-radius:var(--radius);border:1px solid var(--bg4);overflow:hidden}
.editor-type-header{padding:10px 14px;font-size:13px;font-weight:700;color:var(--text2);display:flex;align-items:center;gap:6px;background:var(--bg3)}
.editor-ex{display:flex;align-items:center;gap:8px;padding:8px 14px;border-top:1px solid var(--bg4)}
.editor-ex-input{flex:1;background:var(--bg3);border:1px solid transparent;border-radius:8px;padding:8px 10px;color:var(--text);font-size:13px;outline:none}
.editor-ex-input:focus{border-color:var(--accent)}
.editor-ex-del{background:none;border:none;color:var(--text3);font-size:14px;cursor:pointer;padding:4px 6px}
.editor-ex-del:active{color:var(--red)}
.editor-add{display:flex;align-items:center;justify-content:center;gap:4px;padding:8px;border-top:1px solid var(--bg4);color:var(--accent);font-size:12px;font-weight:600;cursor:pointer;background:none;border-bottom:none;border-left:none;border-right:none;width:100%}
.editor-add:active{background:var(--bg3)}
.editor-save{margin:12px 16px;width:calc(100% - 32px);padding:12px;background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff;border:none;border-radius:50px;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:1px}
.editor-save:active{transform:scale(.97)}

/* DASHBOARD */
.dash-user-card{background:var(--bg2);border-radius:var(--radius);padding:12px 16px;margin:6px 16px;border:1px solid var(--bg4);display:flex;align-items:center;gap:12px;cursor:pointer}
.dash-user-card:active{background:var(--bg3)}
.dash-user-avatar{width:36px;height:36px;border-radius:50%;background:var(--bg4);object-fit:cover}
.dash-user-info{flex:1}
.dash-user-name{font-size:14px;font-weight:600}
.dash-user-meta{font-size:11px;color:var(--text3);margin-top:2px}
.dash-user-count{font-size:12px;color:var(--accent);font-weight:700}
.dash-filter{display:flex;gap:8px;padding:0 16px;margin:8px 0;flex-wrap:wrap}
.dash-filter .chip{padding:6px 14px;font-size:12px}

/* CHIP HIERARCHY */
.chip.current{border-color:var(--accent);background:rgba(139,156,247,.18);color:var(--accentBright);font-size:15px;padding:11px 20px}
.chip.prev{border-color:var(--bg4);background:var(--bg3);color:var(--text2);opacity:.75}
.chip.old{border-color:transparent;background:var(--bg2);color:var(--text3);font-size:13px;padding:7px 14px}
.show-more-btn{background:none;border:1px dashed var(--bg4);border-radius:50px;color:var(--text3);font-size:12px;font-weight:600;padding:7px 16px;cursor:pointer;margin:4px 0}
.show-more-btn:active{background:var(--bg3)}

/* COLLAPSIBLE HISTORY */
.hist-cycle-group{margin:8px 16px}
.hist-cycle-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--bg2);border:1px solid var(--bg4);border-radius:var(--radius);cursor:pointer;transition:.15s}
.hist-cycle-header:active{background:var(--bg3)}
.hist-cycle-header.open{border-bottom-left-radius:0;border-bottom-right-radius:0;border-bottom-color:transparent}
.hist-cycle-title{font-size:14px;font-weight:700;color:var(--accent)}
.hist-cycle-meta{font-size:11px;color:var(--text3);margin-top:2px}
.hist-cycle-chevron{color:var(--text3);font-size:14px;transition:.2s}
.hist-cycle-body{background:var(--bg2);border:1px solid var(--bg4);border-top:none;border-bottom-left-radius:var(--radius);border-bottom-right-radius:var(--radius);overflow:hidden}

.hist-week-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;border-top:1px solid var(--bg4)}
.hist-week-header:first-child{border-top:none}
.hist-week-header:active{background:var(--bg3)}
.hist-week-title{font-size:12px;font-weight:700;color:var(--text2)}
.hist-week-count{font-size:11px;color:var(--text3)}

.hist-log-item{padding:12px 14px;border-top:1px solid rgba(255,255,255,.04)}
.hist-log-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.hist-log-type{font-size:12px;font-weight:700;color:var(--text)}
.hist-log-date{font-size:11px;color:var(--text3)}
.hist-log-del{background:none;border:none;color:var(--text3);font-size:13px;cursor:pointer;padding:2px 6px}
.hist-log-del:active{color:var(--red)}

/* COLLAPSIBLE ADMIN */
.admin-collapse-header{display:flex;align-items:center;justify-content:space-between;cursor:pointer;margin-bottom:0}
.admin-collapse-header h3{margin-bottom:0}
.user-search{width:100%;background:var(--bg3);border:1px solid var(--bg4);border-radius:10px;padding:9px 12px;color:var(--text);font-size:14px;outline:none;margin:10px 0 4px}
.user-search:focus{border-color:var(--accent)}
</style>
</head>
<body>
<div id="root"></div>

<script>
// =====================================================
// FIREBASE INIT

<script>
// =====================================================
// XLSX PARSER v2 — NEW FORMAT (Cycle #5+)
// Sheet names: "1","2","3","4","5" = weeks 1-5
// Each sheet has 3 workouts (אימון 1/2/3)
// Columns: D=code, E=name, F=reps, G=sets, H=RIR, I=variant
// Cardio/AMRAP = TABATA🚀 or AMRAP🚀 section at end of each workout
// Sheet 5 = PEAK week
// =====================================================

// Resolve a cell to the value the coach actually intended.
// Problem: Excel converts hyphen ranges typed into non-text cells (e.g. a coach
// typing "2-3" for sets or RIR) into real DATES. Depending on read options the
// raw value (rawV) then comes through as either a Date object or an Excel serial
// number (~40000-60000), while the DISPLAYED text (dispW, the cell's .w) still
// shows the intended "2-3" (or "2-3" rendered via a d-m format).
// Strategy:
//   - If rawV looks like a corrupted date (Date object, or serial > 40000), trust
//     the displayed text dispW instead — that's the coach's real value.
//   - The d-m number format renders 2026-03-02 as "2-3", which is exactly the
//     range the coach meant, so dispW is correct as-is.
//   - Otherwise return the raw value as a trimmed string.
// Returns "" when there's genuinely nothing usable.
function cellText(rawV, dispW) {
  if (rawV === null || rawV === undefined || rawV === "") {
    return dispW != null ? String(dispW).trim() : "";
  }
  var looksLikeDate =
    (typeof rawV === "object" && rawV instanceof Date) ||
    (typeof rawV === "number" && rawV > 40000 && rawV < 60000);
  if (looksLikeDate) {
    // Prefer the displayed text; it holds the coach's intended "2-3"-style value.
    if (dispW != null && String(dispW).trim() !== "") return String(dispW).trim();
    return ""; // date with no usable display text -> treat as empty, never emit a date
  }
  return String(rawV).trim();
}

function parseWaveXlsx(file) {
  return new Promise(function(resolve, reject) {
    var reader = new FileReader();
    reader.onload = function(e) {
      try {
        // cellNF + cellText ensure each cell's formatted .w is computed, so
        // cellText() can recover hyphen-ranges Excel mangled into dates (e.g. "2-3").
        var wb = XLSX.read(e.target.result, {type:"array", cellNF:true, cellText:true});

        // Extract cycle name/number from cell B2 of sheet 1
        var firstSheet = wb.Sheets[wb.SheetNames[0]];
        var titleCell = firstSheet ? (firstSheet["B2"] || firstSheet["C2"] || firstSheet["B1"]) : null;
        var cycleTitle = titleCell ? String(titleCell.v || "").trim() : "";
        var cycleNumMatch = cycleTitle.match(/#(\d+)/);
        var cycleNum = cycleNumMatch ? parseInt(cycleNumMatch[1]) : Date.now();
        var cycleName = cycleTitle || "Cycle " + cycleNum;

        // All sheets are week sheets (named "1","2","3","4","5" etc)
        var weeks = [];
        wb.SheetNames.forEach(function(name) {
          var weekNum = parseInt(name);
          if (isNaN(weekNum)) return;
          var ws = wb.Sheets[name];
          var range = XLSX.utils.decode_range(ws['!ref'] || "A1:M50");
          var maxRow = range.e.r + 1;

          // Collect all rows as arrays. We keep BOTH the raw value (.v) and the
          // formatted/displayed text (.w). Excel turns hyphen ranges like "2-3"
          // typed into non-text cells into real dates (serial ~46083), so .v is
          // useless there but .w still shows "2-3". cellText() below prefers the
          // human-displayed value precisely to recover those corrupted cells.
          var rows = [];
          for (var r = 1; r <= maxRow; r++) {
            var row = [];
            for (var c = 0; c <= 12; c++) {
              var cell = ws[XLSX.utils.encode_cell({r:r-1, c:c})];
              row.push(cell ? cell.v : null);   // raw value (back-compat with existing code)
            }
            rows.push(row);
          }

          // Parallel grid of displayed text (.w) for the same cells.
          var rowsW = [];
          for (var r2 = 1; r2 <= maxRow; r2++) {
            var roww = [];
            for (var c2 = 0; c2 <= 12; c2++) {
              var cellw = ws[XLSX.utils.encode_cell({r:r2-1, c:c2})];
              roww.push(cellw && cellw.w != null ? cellw.w : null);
            }
            rowsW.push(roww);
          }

          // Peak = last sheet OR if title cell contains "פיק"
          var isPeak = (weekNum === wb.SheetNames.filter(function(n){return !isNaN(parseInt(n));}).length);

          // Parse workouts from the sheet
          // Structure: row with "אימון X" in col C starts a new workout block
          // Then header row, then exercises (col D=code, col E=name, col F=reps, col G=sets, col H=RIR, col I=variant)
          // TABATA🚀 or AMRAP🚀 in col D signals cardio section
          var trainings = {}; // {1: {exercises:[], cardio:[], cardioType:""}, 2:..., 3:...}
          var curTraining = null;
          var inCardio = false;

          rows.forEach(function(row, rowIdx) {
            var roww = rowsW[rowIdx] || [];
            var colC = row[2] ? String(row[2]).trim() : "";
            var colD = row[3] ? String(row[3]).trim() : "";
            var colE = row[4] ? String(row[4]).trim() : "";

            // Detect workout header "אימון X"
            var wMatch = colC.match(/אימון\s*(\d+)/);
            if (wMatch) {
              curTraining = parseInt(wMatch[1]);
              inCardio = false;
              if (!trainings[curTraining]) trainings[curTraining] = {exercises:[], cardio:[], cardioType:"tabata"};
              return;
            }

            if (!curTraining) return;

            // Detect cardio/AMRAP section
            if (colD.match(/TABATA|AMRAP/i) && colD.match(/🚀/)) {
              inCardio = true;
              trainings[curTraining].cardioType = colD.match(/AMRAP/i) ? "amrap" : "tabata";
              return;
            }

            if (inCardio) {
              // Cardio exercise rows — text in col D, no code pattern
              if (colD && !colD.match(/^[A-C]\d$/) && colD.length > 2 && !colD.match(/תרגיל|חזרות|הוראות/)) {
                trainings[curTraining].cardio.push(colD);
              }
              return;
            }

            // Skip header rows
            if (colD === "תרגיל" || colE === "תרגיל" || colC.match(/הוראות|מס'/)) return;

            // Exercise row: col D has code like A1/A2/B1/B2/C1/C2/C3/C4
            var codeMatch = colD.match(/^([A-C])(\d+)$/);
            if (codeMatch && colE) {
              // cellText recovers ranges like "2-3" that Excel corrupted into dates.
              var reps = cellText(row[5], roww[5]);
              var sets = cellText(row[6], roww[6]);
              var rir = cellText(row[7], roww[7]);
              var variant = cellText(row[8], roww[8]);
              trainings[curTraining].exercises.push({
                code: colD,
                group: codeMatch[1].toLowerCase(),
                name: colE.replace(/\n/g," ").trim(),
                reps: reps,
                sets: sets,
                rir: rir,
                variant: variant
              });
            } else if (!codeMatch && colD && colE && row[5]) {
              // Continuation row for A1/B1 (e.g. second set spec like "70% 5RM")
              // Attach to last exercise
              var last = trainings[curTraining].exercises[trainings[curTraining].exercises.length - 1];
              if (last) {
                var reps2 = cellText(row[5], roww[5]);
                var sets2 = cellText(row[6], roww[6]);
                var rir2 = cellText(row[7], roww[7]);
                var variant2 = cellText(row[8], roww[8]);
                if (!last.extraSets) last.extraSets = [];
                last.extraSets.push({
                  reps: reps2,
                  sets: sets2,
                  rir: rir2,
                  variant: variant2
                });
              }
            }
          });

          weeks.push({
            weekNum: weekNum,
            peak: isPeak,
            trainings: trainings // {1:{exercises,cardio,cardioType}, 2:..., 3:...}
          });
        });

        weeks.sort(function(a,b){return a.weekNum-b.weekNum;});

        var cycleId = "cycle_" + cycleNum;
        resolve({
          id: cycleId,
          number: cycleNum,
          name: cycleName,
          weeks: weeks,
          createdAt: new Date().toISOString()
        });
      } catch(err) {
        reject(err);
      }
    };
    reader.onerror = function() { reject(new Error("Failed to read file")); };
    reader.readAsArrayBuffer(file);
  });
}
</script>

// Normalize an exercise name so the same movement (squat / deadlift / etc.)
// matches across cycles and weeks even with minor spacing/punctuation differences.
function normExName(name) {
  return String(name || "")
    .replace(/[\u200e\u200f\u202a-\u202e]/g, "") // strip LTR/RTL marks
    .replace(/[()[\]'".,/\\\-–—:|]/g, " ")        // punctuation -> space
    .replace(/\s+/g, " ")
    .trim()
    .toLowerCase();
}

// Base-movement keyword = first word of the normalized name.
// "סקוואט טמפו 3 שנ ירידה" -> "סקוואט". A squat is always a squat.
function exKeyword(name) {
  var n = normExName(name);
  if (!n) return "";
  var words = n.split(" ").filter(Boolean);
  return words[0] || "";
}
// Superset block letter from a group ("a") or a code ("A1") -> "a".
function exGroupOf(groupOrCode) {
  var s = String(groupOrCode || "").trim().toLowerCase();
  return s ? s[0] : "";
}

// Translate the coach's shorthand in the reps/spec field into readable Hebrew:
//   *  marks repetitions   ("*5-8"  -> "5-8 חזרות")
//   '  marks seconds       ("30'"   -> "30 שניות",  "0:45'" -> "0:45 שניות")
// A value with neither symbol is shown as-is. The * / ' may sit before or after
// the number. Note: this only formats the spec line; it never touches an
// exercise NAME (e.g. "טמפו 3 שנ' ירידה" stays exactly as written).
function describeSpec(spec) {
  var r = String(spec == null ? "" : spec).trim();
  if (!r) return "";
  if (r.indexOf("*") >= 0) {
    var reps = r.replace(/\*/g, "").trim();
    return reps ? reps + " חזרות" : "";
  }
  // seconds marker: straight apostrophe ' or Hebrew geresh ׳, attached to a digit
  if (/[0-9][\s]*['׳]/.test(r) || /['׳][\s]*[0-9]/.test(r)) {
    var secs = r.replace(/['׳]/g, "").trim();
    return secs ? secs + " שניות" : "";
  }
  return r;
}

// Find the most recent previous performance of a movement across all logs.
// Matches by base-movement keyword, scoped to the same superset block (A/B/C):
// an "A" exercise only looks at past "A" exercises, "B" only at "B", etc.
// logs are ordered newest-first. excludeId skips the current in-progress session.
function getLastPerf(ex, logs, excludeId) {
  if (!ex) return null;
  var keyword = exKeyword(ex.name);
  if (!keyword) return null;
  var grp = exGroupOf(ex.group || ex.code);
  for (var i = 0; i < (logs || []).length; i++) {
    var lg = logs[i];
    if (excludeId && lg.id === excludeId) continue;
    var match = (lg.exercises || []).find(function(e) {
      var eGrp = exGroupOf(e.group || e.code);
      // require same block when both sides know their block (lenient for old logs)
      if (grp && eGrp && grp !== eGrp) return false;
      var words = normExName(e.name).split(" ").filter(Boolean);
      return words.indexOf(keyword) !== -1;
    });
    if (match && (match.sets || []).some(function(s) { return s.weight != null || s.reps != null; })) {
      return { date: lg.date, sets: match.sets, cycleName: lg.cycleName, weekNum: lg.weekNum };
    }
  }
  return null;
}

      cardioLog = {workTime: cardioData.workTime, restTime: cardioData.restTime, notes: cardioData.notes, exercises: cardioExercises, type: weekCardioType};

    if (!exLogs.length && !cardioLog) return null;
    return {
      id: sessionLogId,
      date: workoutDate,
      time: new Date().toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit"}),
      cycleId: selCycleId, cycleName: cycle.name, weekNum: selWeek,
      type: selType, location: loc,
      exercises: exLogs,
      cardio: cardioLog,
      updatedAt: new Date().toISOString()
    };

  // When a workout is opened, resolve its session id and resume any existing log
  // for the same date/cycle/week/type so the user can keep updating it.
  React.useEffect(() => {
    if (!selType || !cycle) return;
    var sid = "l_" + workoutDate + "_" + selCycleId + "_w" + selWeek + "_" + selType;
    var existing = logs.find(l =>
      l.id === sid ||
      (l.date === workoutDate && l.cycleId === selCycleId && l.weekNum === selWeek && l.type === selType)
    );
    if (existing) {
      sid = existing.id;
      var hydrated = {};
      var openMap = {};
      (existing.exercises || []).forEach(function(exLog) {
        var idx = exercises.findIndex(function(e) {
          return (exLog.code && e.code === exLog.code) || normExName(e.name) === normExName(exLog.name);
        });
        if (idx >= 0) {
          hydrated[idx] = (exLog.sets || []).map(function(s) {
            return {
              weight: s.weight != null ? String(s.weight) : "",
              reps: s.reps != null ? String(s.reps) : "",
              rir: s.rir != null ? String(s.rir) : "",
              variant: s.variant || "",
              notes: s.notes || ""
            };
          });
          openMap[idx] = true;
        }
      });
      skipSaveRef.current = true; // don't immediately re-save what we just loaded
      setCurSets(hydrated);
      setOpenEx(openMap);
      if (existing.cardio) {
        setCardioData({workTime: existing.cardio.workTime||"", restTime: existing.cardio.restTime||"", notes: existing.cardio.notes||""});
      }
      if (existing.location) setLoc(existing.location);
      setSaveStatus("saved");
    }
    setSessionLogId(sid);
  // eslint-disable-next-line
  }, [selType]);

  // Debounced autosave — fires whenever the user edits sets or cardio.
  React.useEffect(() => {
    if (!selType || !sessionLogId) return;
    if (skipSaveRef.current) { skipSaveRef.current = false; return; }
    var log = buildLog();
    if (!log) return;
    setSaveStatus("saving");
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(function() {
      DB.saveLog(user.uid, log).then(function() {
        setLogs(p => [log, ...p.filter(l => l.id !== log.id)]);
        setSaveStatus("saved");
      }).catch(function(err) {
        console.error(err);
        setSaveStatus("error");
      });
    }, 800);
  // eslint-disable-next-line
  }, [curSets, cardioData, loc, sessionLogId]);

  // Finish the workout: flush any pending save immediately, then return to selection.
  const finishWorkout = async () => {
    if (saveTimer.current) clearTimeout(saveTimer.current);
    var log = buildLog();
    if (log) {
      try {
        await DB.saveLog(user.uid, log);
        setLogs(p => [log, ...p.filter(l => l.id !== log.id)]);
      } catch(err) { console.error(err); }
    }
    flash("האימון נשמר! 💪");
    setSelType(null); setCurSets({}); setOpenEx({});
    setCardioData({workTime:"",restTime:"",notes:""});
    setSessionLogId(null); setSaveStatus("idle");
  };

  const deleteLog = async (id) => {
    if (!confirm("למחוק את האימון?")) return;
    try {
      await DB.deleteLog(user.uid, id);
      setLogs(p => p.filter(l => l.id !== id));
      flash("נמחק");
    } catch(err) { flash("שגיאה",true); }
  };

  // Admin: upload cycle
  const handleUpload = async () => {
    if (!uploadFile) return;
    setUploading(true);
    try {
      var cycleData = await parseWaveXlsx(uploadFile);

      // הגנה 1: סייקל ריק (גליונות לא נקראו נכון) — לא שומרים
      if (!(cycleData.weeks || []).length) {
        flash("הקובץ נקרא אבל לא נמצאו שבועות — בדקו ששמות הגליונות הם 1,2,3...", true);
        setUploading(false);
        return;
      }

      // הגנה 2: בדיקת התנגשות מספר לפני דריסה
      var clash = cycles.find(c => c.id === cycleData.id);
      if (clash) {
        var ok = confirm(
          "כבר קיים סייקל עם מספר #" + cycleData.number + " (\"" + clash.name + "\").\n\n" +
          "העלאה תדרוס אותו לגמרי!\n\n" +
          "אם זה סייקל חדש — בטלו, שנו את המספר (#) בתא B2 בקובץ, והעלו שוב.\n" +
          "להמשיך ולדרוס?"
        );
        if (!ok) { setUploading(false); return; }
      }

      await DB.saveCycle(cycleData);
      setCycles(p => [cycleData, ...p.filter(c=>c.id!==cycleData.id)]);
      setUploadFile(null);
      flash("הסייקל הועלה בהצלחה! 🎉");
    } catch(err) {
      console.error(err);
      flash("שגיאה בקריאת הקובץ: " + err.message, true);
    }
    setUploading(false);
  };

  const deleteCycle = async (id) => {
    if (!confirm("למחוק את הסייקל?")) return;
    try {
      await DB.deleteCycle(id);
      setCycles(p => p.filter(c => c.id !== id));
      if (selCycleId === id) setSelCycleId(null);
      flash("הסייקל נמחק");
    } catch(err) { flash("שגיאה",true); }
  };

  // ======== CYCLE EDITOR ========
  const startEditCycle = (c) => {
    setEditCycle(JSON.parse(JSON.stringify(c)));
    setEditOpenWeeks({});
  };
  const saveEditCycle = async () => {
    if (!editCycle) return;
    setSaving(true);
    try {
      await DB.saveCycle(editCycle);
      setCycles(p => p.map(c => c.id === editCycle.id ? editCycle : c));
      setEditCycle(null);
      flash("הסייקל עודכן! ✅");
    } catch(err) {
      console.error(err);
      flash("שגיאה בשמירה", true);
    }
    setSaving(false);
  };

    try {
      var uLogs = await DB.loadUserLogs(u.uid);
      setDashLogs(uLogs);

      console.error(err);
      flash("שגיאה בטעינת נתונים", true);
      setDashLogs([]);
    }
    setDashLoading(false);

  const exportUserCsv = () => {
    if (!dashLogs.length || !dashUser) return;
    var rows = [["תאריך","שעה","סייקל","שבוע","אימון","קוד","תרגיל","יעד חזרות","סט","משקל","חזרות","RIR","וריאציה","הערות"]];
    dashLogs.forEach(function(log) {
      (log.exercises||[]).forEach(function(ex) {
        (ex.sets||[]).forEach(function(s, si) {
          rows.push([log.date, log.time||"", log.cycleName||"", log.weekNum||"", TN[log.type]||log.type||"", ex.code||"", ex.name||"", ex.targetReps||"", si+1, s.weight||"", s.reps||"", s.rir||"", s.variant||"", s.notes||""]);
        });
      });
      if (log.cardio) {
        rows.push([log.date, log.time||"", log.cycleName||"", log.weekNum||"", TN[log.type]||log.type||"", (log.cardio.type||"").toUpperCase(), (log.cardio.exercises||[]).join("|"), "", "", "", "", "", "", log.cardio.workTime+"/"+log.cardio.restTime+(log.cardio.notes?" "+log.cardio.notes:"")]);
      }
    });
    var csv = "\uFEFF" + rows.map(function(r){return r.join(",");}).join("\n");
    var blob = new Blob([csv], {type:"text/csv;charset=utf-8"});

    a.click();

        counts[u.uid] = snap.size;
      }).catch(function() { counts[u.uid] = 0; });

    });

            <div className="logo-sub">FUNCTIONAL TRAINING</div>
          </div>
        </div>

                {showOldCycles && older.map(c=><div key={c.id} className={"chip old"+(selCycleId===c.id?" active":"")} onClick={()=>{setSelCycleId(c.id);setSelWeek(null);setSelType(null);}}>{c.name}</div>)}

                {w.peak && <span className="peak-badge">PEAK</span>}
                {"שבוע "+w.weekNum}
              </div>)}
            </div>
          </div>}

          {selWeek && week && <div>
            <div className="section-title">בחרו אימון</div>
            <div className="wt-grid">
              {["training1","training2","training3"].map(t=>{

                var td = (week.trainings||{})[tNum];
                var exCount = td ? (td.exercises||[]).length : 0;
                if (!exCount) return null;
                var cardioCount = td ? (td.cardio||[]).length : 0;
                return <div key={t} className={"wt-card"+(selType===t?" active":"")} onClick={()=>{setSelType(t);setCurSets({});setOpenEx({});setLoc("gym");setCardioData({workTime:"",restTime:"",notes:""});setWorkoutDate(new Date().toISOString().split("T")[0]);}}>
                  <div className="wt-icon">{TI[t]}</div>
                  <div className="wt-name">{TN[t]}</div>
                  <div className="wt-count">{exCount+" תרגילים"+(cardioCount?" + "+td.cardioType.toUpperCase():"")}</div>
                </div>;
              })}
            </div>
          </div>}
        </div>)}
      </div>}

      {/* ===== WORKOUT ===== */}
      {tab==="home" && selType && <div>
        <div className="header">
          <button className="back-btn" onClick={goBack}>→</button>
          <img className="logo-img" src="rangeicon.jpg" alt="R" style={{width:34,height:34}} onError={(e)=>{e.target.style.display='none'}} />
          <div>
            <div style={{fontSize:18,fontWeight:800}}>{TI[selType]+" "+TN[selType]}</div>
            <div style={{fontSize:12,color:"var(--text2)"}}>{cycle.name+" · שבוע "+selWeek+(week.peak?" · PEAK WEEK":"")}</div>
          </div>
        </div>

        {/* Date picker */}
        <div className="date-bar">
          <label>📅 תאריך:</label>
          <input className="date-input" type="date" value={workoutDate} onChange={e=>setWorkoutDate(e.target.value)} />
          <button className="today-btn" onClick={()=>setWorkoutDate(new Date().toISOString().split("T")[0])}>היום</button>
        </div>


        {/* EXERCISES */}
        <div style={{marginTop:12}}>
          {exercises.map((ex,idx) => {
            var grp = getGroup(ex);
            var showLabel = isGroupStart(exercises, idx);

            var lastSummary = lastPerf ? (lastPerf.sets||[])
              .filter(s => s.weight != null || s.reps != null)
              .map(s => [s.weight != null ? s.weight + "ק״ג" : "", s.reps != null ? "×" + s.reps : ""].filter(Boolean).join(""))
              .join(" · ") : "";
            return <div key={idx}>
              {showLabel && grp && <div className="group-label">
                <div className={"group-badge "+grp}>{grp.toUpperCase()}</div>
                <div className="group-text">{({a:"סופרסט A",b:"סופרסט B",c:"סופרסט C"})[grp]}</div>
                <div className="group-line"></div>

              <div className={"ex-card"+(grp?" g"+grp:"")}>
                <div className="ex-header" onClick={()=>toggleEx(idx, ex)}>

                  <div style={{flex:1}}>
                    <div className="ex-name">{ex.name}</div>
                    <div style={{fontSize:11,color:"var(--text3)",marginTop:2}}>
                      {ex.reps && <span>{describeSpec(ex.reps)} </span>}
                      {ex.sets && <span>· {ex.sets} סטים </span>}
                      {ex.rir && <span>· RIR {ex.rir}</span>}
                      {ex.variant && <span style={{color:"var(--accent)"}}> · {ex.variant}</span>}
                    </div>
                    {ex.extraSets && ex.extraSets.map((es,esi)=>(
                      <div key={esi} style={{fontSize:10,color:"var(--text3)"}}>
                        {"+ "+describeSpec(es.reps)+" | "+es.sets+" סטים | RIR "+es.rir+(es.variant?" | "+es.variant:"")}
                      </div>
                    ))}
                    {lastSummary && <div style={{fontSize:11,color:"var(--green)",marginTop:3,fontWeight:600}}>
                      📊 פעם קודמת: {lastSummary}

                  <span className="ex-chevron">{openEx[idx]?"▴":"▾"}</span>
                </div>
                {openEx[idx] && <div className="sets-area">

                  {(curSets[idx]||[]).map((s,si)=>{
                    return <div key={si}>
                    <div className="set-row" style={{gap:4}}>
                      <div className="set-label">{si+1}</div>

                      <input className="set-input" style={{flex:1}} type="number" inputMode="numeric" placeholder="חז'" value={s.reps} onChange={e=>updateSet(idx,si,"reps",e.target.value)} />
                      <button className="set-del" onClick={()=>removeSet(idx,si)}>✕</button>

                    <div className="set-notes-row" style={{gap:4}}>
                      <input className="set-notes" style={{flex:"0 0 56px",textAlign:"center"}} type="number" inputMode="numeric" placeholder="RIR" value={s.rir} onChange={e=>updateSet(idx,si,"rir",e.target.value)} />
                      <input className="set-notes" style={{flex:1}} type="text" placeholder={"וריאציה / הערות..."+(ex.variant?" ("+ex.variant+")":" ")} value={s.variant} onChange={e=>updateSet(idx,si,"variant",e.target.value)} />
                    </div>
                  </div>;
                  })}
                  <button className="add-set-btn" onClick={()=>addSet(idx)}>+ הוסף סט</button>
                </div>}
              </div>
            </div>;
          })}

          {/* CARDIO/TABATA section at bottom of workout */}
          {cardioExercises.length > 0 && <div style={{marginTop:12}}>
            <div className="group-label">
              <div className="group-badge" style={{background:"var(--orange)",fontSize:10,width:40,borderRadius:8}}>
                {weekCardioType==="amrap"?"AMRAP":"TABATA"}
              </div>
              <div className="group-line"></div>
            </div>
            <div className="cardio-ex-list">
              {cardioExercises.map((ex,i)=>
                <div className="cardio-ex-item" key={i}>
                  <div className="ex-num">{i+1}</div>
                  <div className="ex-name">{ex}</div>
                </div>
              )}
            </div>
            <div style={{padding:"0 16px",marginTop:8,display:"flex",gap:8}}>
              <div className="cardio-time-box" style={{flex:1}}>
                <div className="cardio-time-label">⏱ זמן עבודה</div>
                <input className="cardio-time-input" type="text" inputMode="numeric" placeholder="0:00" value={cardioData.workTime} onChange={e=>setCardioData(p=>({...p,workTime:e.target.value}))} />

                <div className="cardio-time-label">😮‍💨 זמן מנוחה</div>
                <input className="cardio-time-input" type="text" inputMode="numeric" placeholder="0:00" value={cardioData.restTime} onChange={e=>setCardioData(p=>({...p,restTime:e.target.value}))} />
              </div>
            </div>
            <div className="cardio-notes-wrap" style={{marginTop:8}}>
              <textarea className="cardio-notes-input" placeholder="הערות קרדיו..." value={cardioData.notes} onChange={e=>setCardioData(p=>({...p,notes:e.target.value}))} />
            </div>
          </div>}
        </div>

        {hasData && <div className="save-bar"><div className="save-bar-inner" style={{display:"flex",alignItems:"center",gap:10}}>
          <div className="save-status" style={{flex:"0 0 auto"}}>
            {saveStatus==="saving" && <span style={{color:"var(--text2)"}}>שומר…</span>}
            {saveStatus==="saved" && <span style={{color:"var(--green)"}}>✓ נשמר</span>}
            {saveStatus==="error" && <span style={{color:"var(--red)"}}>⚠ שגיאת שמירה</span>}
          </div>
          <button className="save-btn" style={{flex:1}} onClick={finishWorkout}>סיום אימון</button>
        </div></div>}
      </div>}

      {/* ===== HISTORY ===== */}
      {tab==="history" && <div>
        <div className="header">

          <div className="logo-text" style={{fontSize:22}}>היסטוריה</div>

        {!logs.length ? <div className="empty"><div className="empty-icon">📋</div><div>עדיין אין אימונים שמורים</div></div> :
        (() => {

          var cycleOrder = [];

            var wk = log.weekNum||0;

            grouped[cid].weeks[wk].push(log);
          });
          // dedupe cycleOrder
          cycleOrder = [...new Set(cycleOrder)];
          return cycleOrder.map(cid => {
            var cg = grouped[cid];
            var isOpen = openHistCycles[cid];
            var weekKeys = Object.keys(cg.weeks).sort((a,b)=>b-a);
            var totalLogs = weekKeys.reduce((s,w)=>s+cg.weeks[w].length,0);
            return <div className="hist-cycle-group" key={cid}>
              <div className={"hist-cycle-header"+(isOpen?" open":"")} onClick={()=>setOpenHistCycles(p=>({...p,[cid]:!p[cid]}))}>

                  <div className="hist-cycle-title">{cg.name}</div>
                  <div className="hist-cycle-meta">{totalLogs+" אימונים · "+weekKeys.length+" שבועות"}</div>

                        <span className="hist-week-count">{wlogs.length+" אימונים"}</span>
                        <span className="hist-cycle-chevron">{wOpen?"▾":"◂"}</span>
                      </div>
                    </div>
                    {wOpen && wlogs.map(log=><div className="hist-log-item" key={log.id}>
                      <div className="hist-log-header">
                        <div>
                          <span className="hist-log-type">{TN[log.type]||log.type}</span>
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:6}}>
                          <span className="hist-log-date">{log.date+(log.time?" · "+log.time:"")}</span>
                          <button className="hist-log-del" onClick={()=>deleteLog(log.id)}>🗑</button>
                        </div>
                      </div>
                      <div className="hist-detail">
                        {(log.exercises||[]).map((ex,i)=><div key={i} style={{marginTop:i?6:0}}>
                          <strong>{(ex.code?" ["+ex.code+"] ":"")+(ex.name||"").substring(0,50)}</strong>
                          {ex.targetReps && <span style={{color:"var(--text3)",fontSize:10}}>{" ("+ex.targetReps+")"}</span>}<br/>
                          {(ex.sets||[]).map((s,si)=><span key={si}>
                            {[s.weight?s.weight+"kg":"", s.reps?"×"+s.reps:"", s.rir?"RIR "+s.rir:""].filter(Boolean).join(" ")}
                            {s.variant && <span className="hist-note">{" "+s.variant}</span>}
                            {s.notes && <span className="hist-note">{" — "+s.notes}</span>}
                            {si<ex.sets.length-1?" | ":""}
                          </span>)}
                        </div>)}
                        {log.cardio && <div style={{marginTop:6,paddingTop:6,borderTop:"1px solid var(--bg4)"}}>
                          <span style={{color:"var(--orange)",fontWeight:700,fontSize:11}}>{(log.cardio.type||"tabata").toUpperCase()+" "}</span>
                          {log.cardio.workTime && <span>{"⏱ "+log.cardio.workTime} </span>}
                          {log.cardio.restTime && <span>{"😮‍💨 "+log.cardio.restTime}</span>}
                          {log.cardio.notes && <span className="hist-note">{" — "+log.cardio.notes}</span>}
                        </div>}
                      </div>
                    </div>)}
                  </div>;
                })}
              </div>}
            </div>;
          });
        })()}
      </div>}

      {/* ===== ADMIN / SETTINGS ===== */}
      {tab==="settings" && <div>
        <div className="header">
          <img className="logo-img" src="rangeicon.jpg" alt="R" style={{width:34,height:34}} onError={(e)=>{e.target.style.display='none'}} />
          <div className="logo-text" style={{fontSize:22}}>{admin ? "ניהול" : "הגדרות"}</div>
        </div>

        {/* User info */}
        <div className="storage-info">
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <img src={user.photoURL} style={{width:32,height:32,borderRadius:"50%"}} onError={e=>{e.target.style.display='none'}} />
            <div>
              <strong>{user.displayName}</strong>
              <div style={{fontSize:11,color:"var(--text3)"}}>{user.email}{admin?" · אדמין":""}</div>
            </div>
          </div>
        </div>

        {/* Admin: Upload cycle */}
        {admin && !editCycle && <div className="admin-section">
          <div className="admin-card">
            <h3>📤 העלאת סייקל חדש</h3>
            <p>העלו קובץ xlsx מתבנית הסייקל. הקובץ ייקרא אוטומטית ויתווסף למערכת.</p>
            <div className="file-upload">
              <label className={"file-upload-btn"+(uploadFile?" has-file":"")} htmlFor="cycle-file">
                {uploadFile ? ("✅ "+uploadFile.name) : "📁 בחרו קובץ xlsx"}
              </label>
              <input id="cycle-file" type="file" accept=".xlsx,.xls" onChange={e=>{if(e.target.files[0])setUploadFile(e.target.files[0]);}} />
              <button className="upload-submit" onClick={handleUpload} disabled={!uploadFile||uploading}>{uploading?"מעלה...":"העלה סייקל"}</button>
            </div>
          </div>

          <div className="admin-card">
            <div className="admin-collapse-header" onClick={()=>setAdminCyclesOpen(p=>!p)}>
              <h3>📊 סייקלים קיימים ({cycles.length})</h3>
              <span style={{color:"var(--text3)",fontSize:18}}>{adminCyclesOpen?"▾":"◂"}</span>
            </div>
            {adminCyclesOpen && <>
              <p style={{fontSize:11,color:"var(--text3)",margin:"8px 0"}}>לחצו על סייקל כדי לערוך תרגילים</p>
              {cycles.length ? cycles.map((c,ci)=><div className="cycle-card" key={c.id} style={{margin:"8px 0",cursor:"pointer",opacity:ci===0?1:ci===1?.75:.5}} onClick={()=>startEditCycle(c)}>
                <div>
                  <div className="cycle-name">{c.name} ✏️{ci===0 && <span style={{fontSize:10,color:"var(--green)",marginRight:6}}>● נוכחי</span>}</div>
                  <div className="cycle-meta">{(c.weeks||[]).length+" שבועות"+(c.coachName?" · "+c.coachName:"")}</div>
                </div>
                <button className="cycle-del" onClick={(e)=>{e.stopPropagation();deleteCycle(c.id);}}>🗑</button>
              </div>) : <p>אין סייקלים</p>}
            </>}
          </div>

          <div className="admin-card">
            <div className="admin-collapse-header" onClick={()=>setAdminUsersOpen(p=>!p)}>
              <h3>👥 משתמשים ({allUsers.length})</h3>
              <span style={{color:"var(--text3)",fontSize:18}}>{adminUsersOpen?"▾":"◂"}</span>
            </div>
            {adminUsersOpen && <>
              <input className="user-search" type="text" placeholder="🔍 חיפוש לפי שם או מייל..." value={userSearch} onChange={e=>setUserSearch(e.target.value)} />
              {allUsers.filter(u=>{
                var q = userSearch.trim().toLowerCase();
                if (!q) return true;
                return (u.displayName||"").toLowerCase().includes(q) || (u.email||"").toLowerCase().includes(q);
              }).map(u=><div className="user-row" key={u.uid}>
                <img className="user-avatar" src={u.photoURL} onError={e=>{e.target.style.background="var(--bg4)"}} />
                <div className="user-info">
                  <div className="user-name">{u.displayName||"—"}</div>
                  <div className="user-email">{u.email}</div>
                </div>
                <span className={"user-badge "+(u.role||"trainee")}>{u.role==="admin"?"אדמין":"מתאמן/ת"}</span>
              </div>)}
            </>}
          </div>
        </div>}

        {/* ===== CYCLE EDITOR ===== */}
        {admin && editCycle && <div>
          <div style={{padding:"8px 16px",display:"flex",alignItems:"center",gap:10}}>
            <button className="back-btn" onClick={()=>setEditCycle(null)}>→</button>
            <div style={{flex:1}}>
              <div style={{fontSize:16,fontWeight:800}}>✏️ עריכת {editCycle.name}</div>
              <div style={{fontSize:11,color:"var(--text3)"}}>{(editCycle.weeks||[]).length} שבועות</div>
            </div>
          </div>

          {(editCycle.weeks||[]).map((w,wi) => <div className="editor-week" key={wi}>
            <div className="editor-week-title" onClick={()=>setEditOpenWeeks(p=>({...p,[wi]:!p[wi]}))}>
              {editOpenWeeks[wi] ? "▾" : "◂"}
              {w.peak && <span className="peak-badge">PEAK</span>}
              {"שבוע "+w.weekNum}
            </div>
            {editOpenWeeks[wi] && [1,2,3].map(tNum => {
              var td = (w.trainings||{})[tNum];
              if (!td) return null;
              var exArr = td.exercises||[];
              return <div className="editor-type" key={tNum}>
                <div className="editor-type-header">{TI["training"+tNum]+" "+TN["training"+tNum]+" ("+exArr.length+")"}</div>
                {exArr.map((ex,ei) => <div className="editor-ex" key={ei}>
                  <span style={{fontSize:11,color:"var(--accent)",minWidth:28}}>{ex.code}</span>
                  <input className="editor-ex-input" value={ex.name} onChange={e=>{
                    setEditCycle(p=>{var n=JSON.parse(JSON.stringify(p));n.weeks[wi].trainings[tNum].exercises[ei].name=e.target.value;return n;});
                  }} />
                  <button className="editor-ex-del" onClick={()=>{
                    setEditCycle(p=>{var n=JSON.parse(JSON.stringify(p));n.weeks[wi].trainings[tNum].exercises.splice(ei,1);return n;});
                  }}>✕</button>
                </div>)}
                {(td.cardio||[]).length > 0 && <div style={{padding:"6px 14px",borderTop:"1px solid var(--bg4)"}}>
                  <div style={{fontSize:11,color:"var(--orange)",fontWeight:700}}>{(td.cardioType||"tabata").toUpperCase()}</div>
                  {td.cardio.map((ex,ei)=><div style={{fontSize:12,color:"var(--text2)",paddingRight:8,marginTop:2}} key={ei}>{(ei+1)+". "+ex}</div>)}
                </div>}
              </div>;
            })}
          </div>)}

          <button className="editor-save" onClick={saveEditCycle} disabled={saving}>
            {saving ? "שומר..." : "💾 שמור שינויים"}
          </button>
          <button className="add-set-btn" style={{margin:"8px 16px",width:"calc(100% - 32px)"}} onClick={()=>setEditCycle(null)}>ביטול</button>
        </div>}

        <div className="storage-info" style={{marginTop:16}}>
          <strong>{logs.length}</strong> אימונים שמורים<br/>
          הנתונים נשמרים ב-Firebase (ענן) ונגישים מכל מכשיר.
        </div>

        <button className="add-set-btn" style={{margin:"12px 16px",width:"calc(100% - 32px)"}} onClick={signOut}>🚪 התנתקו</button>
      </div>}

      {/* ===== DASHBOARD (admin only) ===== */}
      {tab==="dashboard" && admin && <div>
        <div className="header">
          {dashUser && <button className="back-btn" onClick={()=>{setDashUser(null);setDashLogs([]);}}>→</button>}
          <img className="logo-img" src="rangeicon.jpg" alt="R" style={{width:34,height:34}} onError={(e)=>{e.target.style.display='none'}} />
          <div className="logo-text" style={{fontSize:22}}>{dashUser ? dashUser.displayName : "דשבורד מאמן"}</div>
        </div>

        {!dashUser ? <div>
          <div className="section-title">{"מתאמנים ("+allUsers.filter(u=>u.role!=="admin").length+")"}</div>
          {allUsers.filter(u=>u.role!=="admin").map(u=><div className="dash-user-card" key={u.uid} onClick={()=>viewUserLogs(u)}>
            <img className="dash-user-avatar" src={u.photoURL} onError={e=>{e.target.style.background="var(--bg4)"}} />
            <div className="dash-user-info">
              <div className="dash-user-name">{u.displayName||"—"}</div>
              <div className="dash-user-meta">{u.email}</div>
            </div>
            <div className="dash-user-count">{(userLogCounts[u.uid]||0)+" אימונים"}</div>
          </div>)}
          {allUsers.filter(u=>u.role==="admin").length > 0 && <div>
            <div className="section-title">אדמינים</div>
            {allUsers.filter(u=>u.role==="admin").map(u=><div className="dash-user-card" key={u.uid} onClick={()=>viewUserLogs(u)}>
              <img className="dash-user-avatar" src={u.photoURL} onError={e=>{e.target.style.background="var(--bg4)"}} />
              <div className="dash-user-info">
                <div className="dash-user-name">{u.displayName||"—"}</div>
                <div className="dash-user-meta">{u.email}</div>
              </div>
              <div className="dash-user-count">{(userLogCounts[u.uid]||0)+" אימונים"}</div>
            </div>)}
          </div>}
        </div> :

        <div>
          {dashLoading ? <div className="empty"><div className="spinner"></div><div style={{marginTop:12}}>טוען אימונים...</div></div> :
          !dashLogs.length ? <div className="empty"><div className="empty-icon">📋</div><div>אין אימונים שמורים</div></div> :
          <div>
            <div style={{padding:"8px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontSize:13,color:"var(--text2)"}}>{dashLogs.length+" אימונים"}</div>
              <button className="today-btn" onClick={exportUserCsv}>📥 ייצוא CSV</button>
            </div>
            {dashLogs.map(log=><div className="hist-card" key={log.id}>
              <div className="hist-date">{log.date+" · "+log.time}</div>
              <div className="hist-info">{TN[log.type]||log.type}{" · "+log.cycleName+" · שבוע "+log.weekNum}</div>
              <div className="hist-detail">
                {(log.exercises||[]).map((ex,i)=><div key={i} style={{marginTop:i?6:0}}>
                  <strong>{(ex.code?" ["+ex.code+"] ":"")+(ex.name||"").substring(0,50)}</strong>
                  {ex.targetReps && <span style={{color:"var(--text3)",fontSize:10}}>{" ("+ex.targetReps+")"}</span>}<br/>
                  {(ex.sets||[]).map((s,si)=><span key={si}>
                    {[s.weight?s.weight+"kg":"", s.reps?"×"+s.reps:"", s.rir?"RIR "+s.rir:""].filter(Boolean).join(" ")}
                    {s.variant && <span className="hist-note">{" "+s.variant}</span>}
                    {s.notes && <span className="hist-note">{" — "+s.notes}</span>}
                    {si<ex.sets.length-1?" | ":""}
                  </span>)}
                </div>)}
                {log.cardio && <div style={{marginTop:6,paddingTop:6,borderTop:"1px solid var(--bg4)"}}>
                  <span style={{color:"var(--orange)",fontWeight:700,fontSize:11}}>{(log.cardio.type||"").toUpperCase()+" "}</span>
                  {log.cardio.workTime && <span>{"⏱ "+log.cardio.workTime} </span>}
                  {log.cardio.restTime && <span>{"😮‍💨 "+log.cardio.restTime}</span>}
                  {log.cardio.notes && <span className="hist-note">{" — "+log.cardio.notes}</span>}
                </div>}
              </div>
            </div>)}
          </div>}
        </div>}
      </div>}

      {/* ===== NAV ===== */}
      <div className="nav"><div className="nav-inner">
        <button className={"nav-btn"+(tab==="home"?" active":"")} onClick={()=>{setTab("home");setSelType(null);}}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>אימון
        </button>
        <button className={"nav-btn"+(tab==="history"?" active":"")} onClick={()=>setTab("history")}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>היסטוריה
        </button>
        {admin && <button className={"nav-btn"+(tab==="dashboard"?" active":"")} onClick={()=>{setTab("dashboard");setDashUser(null);}}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4-4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>דשבורד
        </button>}
        <button className={"nav-btn"+(tab==="settings"?" active":"")} onClick={()=>setTab("settings")}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>{admin?"ניהול":"הגדרות"}
        </button>
      </div></div>
    </div>
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>

<script>
// Register Service Worker for PWA — with auto-update so new versions
// roll out without a hard refresh on every device.
if ('serviceWorker' in navigator) {
  var swRefreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', function() {
    if (swRefreshing) return;
    swRefreshing = true;
    window.location.reload();
  });
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('./sw.js').then(function(reg) {
      reg.update();
      reg.addEventListener('updatefound', function() {
        var nw = reg.installing;
        if (!nw) return;
        nw.addEventListener('statechange', function() {
          // A new SW is installed and an old one is in control -> activate it now
          if (nw.state === 'installed' && navigator.serviceWorker.controller) {
            nw.postMessage('skipWaiting');
          }
        });
      });
    }).catch(function(err) {
      console.log('SW registration failed:', err);
    });
  });
}
</script>
</body>
</html>
