  // ---------- exercise library ----------
  const libByNorm = React.useMemo(() => {
    var m = {};
    lib.forEach(e => { m[normExName(e.name)] = e; });
    return m;
  }, [lib]);

  const ensureLib = (name, measure, load) => {
    var n = normExName(name);
    if (!n) return null;
    if (libByNorm[n]) return libByNorm[n];
    var entry = { id: libIdFor(name), name: String(name).trim(), measure: measure||"reps", load: load||"kg", createdAt: new Date().toISOString() };
    setLib(p => p.some(e => e.id === entry.id) ? p : [...p, entry]);
    DB.saveExercise(entry).catch(console.error);
    return entry;
  };

  const buildLibraryFromCycles = async () => {
    var added = 0;
    var seen = Object.assign({}, libByNorm);
    var toSave = [];
    cycles.forEach(c => (c.weeks||[]).forEach(w => Object.keys(w.trainings||{}).forEach(k => {
      ((w.trainings[k]||{}).exercises||[]).forEach(ex => {
        var n = normExName(ex.name);
        if (!n || seen[n]) return;
        var entry = { id: libIdFor(ex.name), name: String(ex.name).trim(), measure: ex.measure||"reps", load: ex.load||"kg", createdAt: new Date().toISOString() };
        seen[n] = entry; toSave.push(entry); added++;
      });
    })));
    if (!added) { flash("המאגר כבר מעודכן — אין תרגילים חדשים"); return; }
    setSaving(true);
    try {
      await Promise.all(toSave.map(e => DB.saveExercise(e)));
      setLib(p => [...p, ...toSave]);
      flash(added + " תרגילים נוספו למאגר 📚");
    } catch(err) { console.error(err); flash("שגיאה בבניית המאגר", true); }
    setSaving(false);
  };

  // ---------- session actions ----------
  const resetSession = () => {
    setCurSets({}); setOpenEx({}); setExtras([]); setRemoved([]);
    setCardioData({workTime:"",restTime:"",notes:""});
    setSessionLogId(null); setSaveStatus("idle");
  };
  const goBack = () => {
    if (selType) { setSelType(null); resetSession(); }
    else if (selWeek) setSelWeek(null);
  };

  const toggleEx = (key, ex) => {
    setOpenEx(p => ({...p, [key]: !p[key]}));
    if (!curSets[key]) {
      var numSets = ex && ex.sets ? (parseInt(ex.sets) || 3) : 3;
      var init = [];
      for (var s = 0; s < numSets; s++) init.push(emptySet());
      setCurSets(p => ({...p, [key]: init}));
    }
    ensureLib(ex.name, ex.measure, ex.load);
  };
  const updateSet = (key, si, f, v) => {
    setCurSets(p => { var n={...p}; n[key]=[...n[key]]; n[key][si]={...n[key][si],[f]:v}; return n; });
  };
  const addSet = (key) => {
    setCurSets(p => { var n={...p}; var a=n[key]||[]; var l=a[a.length-1]||emptySet(); n[key]=[...a,{load:l.load,value:"",rir:"",variation:l.variation,notes:""}]; return n; });
  };
  const removeSet = (key, si) => {
    setCurSets(p => { var n={...p}; n[key]=n[key].filter((_,i)=>i!==si); if(!n[key].length) delete n[key]; return n; });
  };

  const removeExercise = (item) => {
    if (!confirm("להסיר את התרגיל מהאימון הנוכחי?")) return;
    setCurSets(p => { var n={...p}; delete n[item.key]; return n; });
    setOpenEx(p => { var n={...p}; delete n[item.key]; return n; });
    if (item.added) {
      // re-key remaining extras' state maps
      var rekey = p => {
        var n = {};
        Object.keys(p).forEach(k => {
          var m = k.match(/^x_(\d+)$/);
          if (!m) { n[k] = p[k]; return; }
          var xi = parseInt(m[1]);
          if (xi === item.extraIdx) return;
          n[xi > item.extraIdx ? "x_"+(xi-1) : k] = p[k];
        });
        return n;
      };
      setExtras(prev => prev.filter((_,i) => i !== item.extraIdx));
      setCurSets(rekey);
      setOpenEx(rekey);
    } else {
      setRemoved(prev => prev.indexOf(item.planIdx) === -1 ? [...prev, item.planIdx] : prev);
    }
  };

  const addExerciseFromLib = (entry) => {
    var ex = { code:"", group:"", name: entry.name, variation:"", measure: entry.measure, load: entry.load, target:"", sets:"3", rir:"", notes:"", exerciseId: entry.id };
    setExtras(p => [...p, ex]);
    setAddModal(false); setLibSearch("");
    flash("התרגיל נוסף לאימון ✅");
  };
  const createAndAddExercise = () => {
    if (!newEx.name.trim()) return;
    var entry = ensureLib(newEx.name, newEx.measure, newEx.load);
    addExerciseFromLib(entry || {id: libIdFor(newEx.name), name: newEx.name.trim(), measure: newEx.measure, load: newEx.load});
    setNewEx({name:"", measure:"reps", load:"kg"});
  };

  // ---------- build + persist log ----------
  const buildLog = (status) => {
    if (!cycle || !sessionLogId) return null;
    var exLogs = [];
    displayList.forEach(item => {
      var sets = curSets[item.key];
      if (!sets) return;
      var filled = sets.filter(s => s.load || s.value || s.rir || s.variation || s.notes);
      if (!filled.length) return;
      var ex = item.ex;
      var libEntry = libByNorm[normExName(ex.name)];
      exLogs.push({
        exerciseId: ex.exerciseId || (libEntry ? libEntry.id : libIdFor(ex.name)),
        code: ex.code || "", group: ex.group || "",
        name: ex.name, variation: ex.variation || "",
        measure: ex.measure, load: ex.load,
        target: ex.target || "", rir: ex.rir || "", coachNotes: ex.notes || "",
        added: !!item.added,
        sets: filled.map(s => ({
          load: ex.load === "kg" ? (s.load ? parseFloat(s.load) : null) : (ex.load === "text" ? (s.load || null) : null),
          value: ex.measure === "reps" ? (s.value ? parseInt(s.value) : null) : (s.value || null),
          rir: s.rir || null,
          variation: s.variation || null,
          notes: s.notes || null
        }))
      });
    });
    var cardioLog = null;
    if (cardioData.workTime || cardioData.restTime || cardioData.notes) {
      cardioLog = {
        workTime: cardioData.workTime, restTime: cardioData.restTime, notes: cardioData.notes,
        exercises: cardioPlan ? cardioPlan.exercises : [], type: cardioPlan ? cardioPlan.type : "tabata"
      };
    }
    if (!exLogs.length && !cardioLog) return null;
    return {
      id: sessionLogId,
      date: workoutDate,
      time: new Date().toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit"}),
      cycleId: selCycleId, cycleName: cycle.name, weekNum: selWeek,
      type: selType, location: loc,
      status: status || "active",
      exercises: exLogs,
      addedExercises: extras,
      removed: removed,
      cardio: cardioLog,
      updatedAt: new Date().toISOString()
    };
  };

  // resolve session id + hydrate existing log
  React.useEffect(() => {
    if (!selType || !cycle) return;
    var sid = "l_" + workoutDate + "_" + selCycleId + "_w" + selWeek + "_" + selType;
    var existing = logs.find(l =>
      l.id === sid ||
      (l.date === workoutDate && l.cycleId === selCycleId && l.weekNum === selWeek && l.type === selType)
    );
    if (existing) {
      sid = existing.id;
      var extrasDefs = (existing.addedExercises || []).map(e => Object.assign({}, e));
      var removedIdx = existing.removed || [];
      var hydrated = {}, openMap = {};
      var usedExtra = {};
      (existing.exercises || []).forEach(exLog => {
        var key = null;
        if (exLog.added) {
          for (var xi = 0; xi < extrasDefs.length; xi++) {
            if (!usedExtra[xi] && normExName(extrasDefs[xi].name) === normExName(exLog.name)) { usedExtra[xi] = true; key = "x_"+xi; break; }
          }
        } else {
          var pi = planExercises.findIndex(p => (exLog.code && p.code === exLog.code) || normExName(p.name) === normExName(exLog.name));
          if (pi >= 0) key = "p_"+pi;
        }
        if (!key) return;
        hydrated[key] = (exLog.sets || []).map(s => ({
          load: s.load != null ? String(s.load) : (s.weight != null ? String(s.weight) : ""),
          value: s.value != null ? String(s.value) : (s.reps != null ? String(s.reps) : ""),
          rir: s.rir != null ? String(s.rir) : "",
          variation: s.variation || "",
          notes: s.notes || ""
        }));
        openMap[key] = true;
      });
      skipSaveRef.current = true;
      setExtras(extrasDefs);
      setRemoved(removedIdx);
      setCurSets(hydrated);
      setOpenEx(openMap);
      if (existing.cardio) setCardioData({workTime: existing.cardio.workTime||"", restTime: existing.cardio.restTime||"", notes: existing.cardio.notes||""});
      if (existing.location) setLoc(existing.location);
      setSaveStatus("saved");
    }
    setSessionLogId(sid);
  // eslint-disable-next-line
  }, [selType, hydrateKey]);

  const hasData = selType
    ? Object.values(curSets).some(sets => sets && sets.some(s => s.load || s.value || s.variation || s.notes))
      || !!(cardioData.workTime || cardioData.restTime || cardioData.notes)
    : false;

  // debounced autosave
  React.useEffect(() => {
    if (!selType || !sessionLogId) return;
    if (skipSaveRef.current) { skipSaveRef.current = false; return; }
    var log = buildLog("active");
    if (!log) return;
    setSaveStatus("saving");
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(function() {
      DB.saveLog(user.uid, log).then(function() {
        setLogs(p => [log, ...p.filter(l => l.id !== log.id)]);
        setSaveStatus("saved");
      }).catch(function(err) { console.error(err); setSaveStatus("error"); });
    }, 800);
  // eslint-disable-next-line
  }, [curSets, cardioData, loc, extras, removed, sessionLogId]);

  const finishWorkout = async () => {
    if (saveTimer.current) clearTimeout(saveTimer.current);
    var log = buildLog("done");
    if (log) {
      try {
        await DB.saveLog(user.uid, log);
        setLogs(p => [log, ...p.filter(l => l.id !== log.id)]);
      } catch(err) { console.error(err); }
    }
    flash("האימון נשמר! 💪");
    setSelType(null);
    resetSession();
  };

  const reopenLog = (log) => {
    var c = cycles.find(x => x.id === log.cycleId);
    if (!c) { flash("הסייקל של האימון הזה כבר לא קיים במערכת", true); return; }
    var updated = Object.assign({}, log, {status:"active"});
    DB.saveLog(user.uid, updated).catch(console.error);
    setLogs(p => p.map(l => l.id === log.id ? updated : l));
    resetSession();
    setSelCycleId(log.cycleId);
    setSelWeek(log.weekNum);
    setWorkoutDate(log.date);
    setSelType(log.type);
    setHydrateKey(k => k + 1);
    setTab("home");
    flash("האימון נפתח לעריכה ✏️");
  };

  const deleteLog = async (id) => {
    if (!confirm("למחוק את האימון?")) return;
    try {
      await DB.deleteLog(user.uid, id);
      setLogs(p => p.filter(l => l.id !== id));
      flash("נמחק");
    } catch(err) { flash("שגיאה",true); }
  };

  // ---------- admin ----------
  const handleUpload = async () => {
    if (!uploadFile) return;
    setUploading(true);
    try {
      var cycleData = await parseCycleXlsx(uploadFile);
      if (cycles.some(c => c.id === cycleData.id)) {
        if (!confirm("סייקל \"" + cycleData.name + "\" כבר קיים במערכת. להחליף אותו?\n(אם זה סייקל חדש — עדכנו את מספר הסייקל #N בתא B2 של הקובץ)")) {
          setUploading(false);
          return;
        }
      }
      await DB.saveCycle(cycleData);
      setCycles(p => [cycleData, ...p.filter(c => c.id !== cycleData.id)].sort((a,b)=>b.number-a.number));
      // auto-add new exercises to the library
      var toSave = [];
      var seen = Object.assign({}, libByNorm);
      (cycleData.weeks||[]).forEach(w => Object.keys(w.trainings||{}).forEach(k => {
        ((w.trainings[k]||{}).exercises||[]).forEach(ex => {
          var n = normExName(ex.name);
          if (!n || seen[n]) return;
          var entry = { id: libIdFor(ex.name), name: String(ex.name).trim(), measure: ex.measure, load: ex.load, createdAt: new Date().toISOString() };
          seen[n] = entry; toSave.push(entry);
        });
      }));
      if (toSave.length) {
        Promise.all(toSave.map(e => DB.saveExercise(e))).then(() => setLib(p => [...p, ...toSave])).catch(console.error);
      }
      setUploadFile(null);
      flash("הסייקל הועלה בהצלחה! 🎉" + (toSave.length ? " (+" + toSave.length + " תרגילים למאגר)" : ""));
    } catch(err) {
      console.error(err);
      flash("שגיאה בקריאת הקובץ: " + err.message, true);
    }
    setUploading(false);
  };

  const deleteCycle = async (id) => {
    if (!confirm("למחוק את הסייקל?")) return;
    try {
      await DB.deleteCycle(id);
      setCycles(p => p.filter(c => c.id !== id));
      if (selCycleId === id) setSelCycleId(null);
      flash("הסייקל נמחק");
    } catch(err) { flash("שגיאה",true); }
  };

  const startEditCycle = (c) => { setEditCycle(JSON.parse(JSON.stringify(c))); setEditOpenWeeks({}); };
  const saveEditCycle = async () => {
    if (!editCycle) return;
    setSaving(true);
    try {
      await DB.saveCycle(editCycle);
      setCycles(p => p.map(c => c.id === editCycle.id ? editCycle : c));
      setEditCycle(null);
      flash("הסייקל עודכן! ✅");
    } catch(err) { console.error(err); flash("שגיאה בשמירה", true); }
    setSaving(false);
  };

  const saveLibEdit = async () => {
    if (!libEditId || !libEditForm.name.trim()) return;
    var updated = Object.assign({}, lib.find(e => e.id === libEditId), { name: libEditForm.name.trim(), measure: libEditForm.measure, load: libEditForm.load });
    try {
      await DB.saveExercise(updated);
      setLib(p => p.map(e => e.id === libEditId ? updated : e));
      setLibEditId(null);
      flash("התרגיל עודכן ✅");
    } catch(err) { flash("שגיאה", true); }
  };
  const deleteLibEntry = async (id) => {
    if (!confirm("למחוק את התרגיל מהמאגר? (היסטוריית האימונים לא תימחק)")) return;
    try {
      await DB.deleteExercise(id);
      setLib(p => p.filter(e => e.id !== id));
      flash("נמחק מהמאגר");
    } catch(err) { flash("שגיאה", true); }
  };

  // ---------- dashboard ----------
  const viewUserLogs = async (u) => {
    setDashUser(u); setDashLoading(true);
    try { setDashLogs(await DB.loadUserLogs(u.uid)); }
    catch(err) { console.error(err); flash("שגיאה בטעינת נתונים", true); setDashLogs([]); }
    setDashLoading(false);
  };
  const exportUserCsv = () => {
    if (!dashLogs.length || !dashUser) return;
    var rows = [["תאריך","שעה","סייקל","שבוע","אימון","מיקום","קוד","תרגיל","וריאציה","יעד","סט","משקל/עומס","חזרות/זמן","RIR","הערות"]];
    dashLogs.forEach(function(log) {
      (log.exercises||[]).forEach(function(ex) {
        (ex.sets||[]).forEach(function(s, si) {
          var loadVal = s.load != null ? s.load : (s.weight != null ? s.weight : "");
          var valVal = s.value != null ? s.value : (s.reps != null ? s.reps : "");
          rows.push([log.date, log.time||"", log.cycleName||"", log.weekNum||"", TN[log.type]||log.type||"",
            log.location==="gym"?"סטודיו":"קיר", ex.code||"", ex.name||"", (s.variation||ex.variation||""),
            ex.target||ex.targetReps||"", si+1, loadVal, valVal, s.rir||"", s.notes||""]);
        });
      });
      if (log.cardio) {
        rows.push([log.date, log.time||"", log.cycleName||"", log.weekNum||"", TN[log.type]||log.type||"",
          log.location==="gym"?"סטודיו":"קיר", (log.cardio.type||"").toUpperCase(), (log.cardio.exercises||[]).join("|"),
          "", "", "", "", log.cardio.workTime+"/"+log.cardio.restTime, "", log.cardio.notes||""]);
      }
    });
    var csv = "\uFEFF" + rows.map(r => r.map(x => String(x==null?"":x).replace(/,/g,";")).join(",")).join("\n");
    var blob = new Blob([csv], {type:"text/csv;charset=utf-8"});
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = (dashUser.displayName||"user")+"_logs.csv";
    a.click();
  };

  React.useEffect(() => {
    if (!admin || !allUsers.length) return;
    var counts = {};
    Promise.all(allUsers.map(u =>
      db.collection("users").doc(u.uid).collection("logs").get()
        .then(snap => { counts[u.uid] = snap.size; })
        .catch(() => { counts[u.uid] = 0; })
    )).then(() => setUserLogCounts(counts));
  }, [allUsers, admin]);

  // =================== RENDER ===================

  if (user === undefined) return <div className="loading-screen"><div className="spinner"></div><div>טוען...</div></div>;

  if (!user) return (
    <div className="login-screen">
      <img className="login-logo" src="rangeicon.jpg" alt="RANGE" onError={(e)=>{e.target.style.display='none'}} />
      <div className="login-title">RANGE</div>
      <div className="login-sub">FUNCTIONAL TRAINING</div>
      <button className="google-btn" onClick={signIn}>
        <GoogleLogo />
        התחברות עם Google
      </button>
    </div>
  );

  // ---------- shared renderers ----------
  const renderLogDetail = (log) => (
    <div className="hist-detail">
      {(log.exercises||[]).map((ex,i)=><div key={i} style={{marginTop:i?6:0}}>
        <strong>{(ex.code?"["+ex.code+"] ":"")+(ex.name||"").substring(0,40)}</strong>
        {(ex.variation) && <span className="ex-variation">{ex.variation}</span>}
        {ex.added && <span style={{color:"var(--green)",fontSize:10}}> +נוסף</span>}
        {(ex.target||ex.targetReps) && <span style={{color:"var(--text3)",fontSize:10}}>{" ("+(ex.target||ex.targetReps)+")"}</span>}<br/>
        {(ex.sets||[]).map((s,si)=><span key={si}>
          {fmtSetStr(s)}
          {s.rir && <span>{" RIR "+s.rir}</span>}
          {s.variation && <span className="hist-note">{" "+s.variation}</span>}
          {s.notes && <span className="hist-note">{" — "+s.notes}</span>}
          {si<ex.sets.length-1?" | ":""}
        </span>)}
      </div>)}
      {log.cardio && <div style={{marginTop:6,paddingTop:6,borderTop:"1px solid var(--bg4)"}}>
        <span style={{color:"var(--orange)",fontWeight:700,fontSize:11}}>{(log.cardio.type||"tabata").toUpperCase()+" "}</span>
        {log.cardio.workTime && <span>{"⏱ "+log.cardio.workTime} </span>}
        {log.cardio.restTime && <span>{"😮‍💨 "+log.cardio.restTime}</span>}
        {log.cardio.notes && <span className="hist-note">{" — "+log.cardio.notes}</span>}
      </div>}
    </div>
  );

  return (
    <div className="app">
      {toast && <div className={"toast"+(toast.err?" error":"")}>{toast.msg}</div>}
      {saving && <div className="saving-overlay"><div className="spinner"></div><div style={{color:"var(--text2)"}}>שומר...</div></div>}

      {/* ===== PREVIOUS PERFORMANCE MODAL ===== */}
      {perfModal && (() => {
        var hist = getPerfHistory(perfModal, logs, sessionLogId, 3);
        return <div className="modal-overlay" onClick={()=>setPerfModal(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-title">
              <span>📊 {perfModal.name}{perfModal.variation ? " · "+perfModal.variation : ""}</span>
              <button className="modal-close" onClick={()=>setPerfModal(null)}>✕</button>
            </div>
            {!hist.length ? <div className="empty" style={{padding:"30px 10px"}}>אין עדיין ביצועים קודמים לתרגיל הזה</div> :
            hist.map((h,hi)=><div className="perf-entry" key={hi}>
              <div className="perf-entry-head">
                <span>{h.date}</span>
                <span className="perf-entry-meta">{(h.cycleName||"")+(h.weekNum?" · שבוע "+h.weekNum:"")}</span>
              </div>
              {h.entry.variation && <div style={{marginTop:4}}><span className="ex-variation">{h.entry.variation}</span></div>}
              {(h.entry.sets||[]).map((s,si)=><div className="perf-set" key={si}>
                <span className="perf-set-num">{si+1}</span>
                <span style={{fontWeight:700}}>{fmtSetStr(s) || "—"}</span>
                {s.rir && <span style={{fontSize:11,color:"var(--accent)"}}>RIR {s.rir}</span>}
                {s.variation && <span className="perf-set-note">{s.variation}</span>}
                {s.notes && <span className="perf-set-note">— {s.notes}</span>}
              </div>)}
            </div>)}
          </div>
        </div>;
      })()}

      {/* ===== ADD EXERCISE MODAL ===== */}
      {addModal && (() => {
        var q = normExName(libSearch);
        var results = lib.filter(e => !q || normExName(e.name).indexOf(q) >= 0).slice(0, 30);
        return <div className="modal-overlay" onClick={()=>setAddModal(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-title">
              <span>➕ הוספת תרגיל לאימון</span>
              <button className="modal-close" onClick={()=>setAddModal(false)}>✕</button>
            </div>
            <input className="lib-search" type="text" placeholder="🔍 חיפוש במאגר התרגילים..." value={libSearch} onChange={e=>setLibSearch(e.target.value)} />
            <div style={{maxHeight:"32vh",overflowY:"auto"}}>
              {results.map(e=><div className="lib-row" key={e.id} onClick={()=>addExerciseFromLib(e)}>
                <div className="lib-row-name">{e.name}</div>
                <span className={"badge-mini"+(e.measure==="time"?" time":"")}>{e.measure==="time"?"⏱ זמן":"חזרות"}</span>
                <span className={"badge-mini"+(e.load==="kg"?" kg":e.load==="text"?" loadtxt":"")}>{e.load==="kg"?"ק״ג":e.load==="text"?"עומס":"—"}</span>
              </div>)}
              {!results.length && <div style={{padding:"14px 4px",fontSize:13,color:"var(--text3)"}}>לא נמצא במאגר — צרו חדש למטה ⬇</div>}
            </div>
            <div className="modal-section-label">או צרו תרגיל חדש</div>
            <input className="lib-search" type="text" placeholder="שם התרגיל (השם הראשי בלבד)" value={newEx.name} onChange={e=>setNewEx(p=>({...p,name:e.target.value}))} />
            <div style={{display:"flex",gap:8}}>
              <div style={{flex:1}}>
                <div className="seg-toggle">
                  <button className={"seg-btn"+(newEx.measure==="reps"?" active":"")} onClick={()=>setNewEx(p=>({...p,measure:"reps"}))}>חזרות</button>
                  <button className={"seg-btn"+(newEx.measure==="time"?" active":"")} onClick={()=>setNewEx(p=>({...p,measure:"time"}))}>⏱ זמן</button>
                </div>
              </div>
              <div style={{flex:1.4}}>
                <div className="seg-toggle">
                  <button className={"seg-btn"+(newEx.load==="kg"?" active":"")} onClick={()=>setNewEx(p=>({...p,load:"kg"}))}>ק״ג</button>
                  <button className={"seg-btn"+(newEx.load==="text"?" active":"")} onClick={()=>setNewEx(p=>({...p,load:"text"}))}>עומס</button>
                  <button className={"seg-btn"+(newEx.load==="none"?" active":"")} onClick={()=>setNewEx(p=>({...p,load:"none"}))}>ללא</button>
                </div>
              </div>
            </div>
            <button className="modal-primary" disabled={!newEx.name.trim()} onClick={createAndAddExercise}>צור והוסף לאימון</button>
          </div>
        </div>;
      })()}

      {/* ===== HOME: SELECT ===== */}
      {tab==="home" && !selType && <div>
        <div className="header">
          {selWeek && <button className="back-btn" onClick={goBack}>→</button>}
          <img className="logo-img" src="rangeicon.jpg" alt="RANGE" onError={(e)=>{e.target.style.display='none'}} />
          <div>
            <div className="logo-text">RANGE</div>
            <div className="logo-sub">FUNCTIONAL TRAINING</div>
          </div>
        </div>

        {!cycles.length ? (
          <div className="empty">
            <div className="empty-icon">📋</div>
            <div>{admin ? "עדיין אין סייקלים. לכו לטאב ניהול להעלות סייקל" : "עדיין אין סייקלים. המאמן יעלה בקרוב!"}</div>
          </div>
        ) : (<div>
          <div className="section-title">בחרו סייקל</div>
          <div className="chips">
            {(() => {
              var latest = cycles[0], prev = cycles[1], older = cycles.slice(2);
              return <React.Fragment>
                <div className={"chip current"+(selCycleId===latest.id?" active":"")} onClick={()=>{setSelCycleId(latest.id);setSelWeek(null);setSelType(null);}}>{latest.name}</div>
                {prev && <div className={"chip prev"+(selCycleId===prev.id?" active":"")} onClick={()=>{setSelCycleId(prev.id);setSelWeek(null);setSelType(null);}}>{prev.name}</div>}
                {older.length > 0 && !showOldCycles && <button className="show-more-btn" onClick={()=>setShowOldCycles(true)}>+ {older.length} סייקלים ישנים</button>}
                {showOldCycles && older.map(c=><div key={c.id} className={"chip old"+(selCycleId===c.id?" active":"")} onClick={()=>{setSelCycleId(c.id);setSelWeek(null);setSelType(null);}}>{c.name}</div>)}
              </React.Fragment>;
            })()}
          </div>

          {cycle && <div>
            <div className="section-title">בחרו שבוע</div>
            <div className="chips">
              {(cycle.weeks||[]).map(w=><div key={w.weekNum} className={"chip"+(selWeek===w.weekNum?" active":"")} onClick={()=>{setSelWeek(w.weekNum);setSelType(null);}}>
                {w.peak && <span className="peak-badge">PEAK</span>}
                {"שבוע "+w.weekNum}
              </div>)}
            </div>
          </div>}

          {selWeek && week && <div>
            <div className="section-title">בחרו אימון</div>
            <div className="wt-grid">
              {["training1","training2","training3"].map(t=>{
                var tNum = parseInt(t.replace("training",""));
                var td = (week.trainings||{})[tNum];
                var exCount = td ? (td.exercises||[]).length : 0;
                if (!exCount) return null;
                var cardioCount = td && td.cardio ? (td.cardio.exercises||[]).length : 0;
                return <div key={t} className={"wt-card"+(selType===t?" active":"")} onClick={()=>{resetSession();setLoc("gym");setWorkoutDate(new Date().toISOString().split("T")[0]);setSelType(t);setHydrateKey(k=>k+1);}}>
                  <div className="wt-icon">{TI[t]}</div>
                  <div className="wt-name">{(td.title||"").replace(/^אימון\s*\d+\s*[—-]?\s*/,"") || TN[t]}</div>
                  <div className="wt-count">{exCount+" תרגילים"+(cardioCount?" + "+(td.cardio.type||"").toUpperCase():"")}</div>
                </div>;
              })}
            </div>
          </div>}
        </div>)}
      </div>}

      {/* ===== WORKOUT ===== */}
      {tab==="home" && selType && <div>
        <div className="header">
          <button className="back-btn" onClick={goBack}>→</button>
          <img className="logo-img" src="rangeicon.jpg" alt="R" style={{width:34,height:34}} onError={(e)=>{e.target.style.display='none'}} />
          <div>
            <div style={{fontSize:18,fontWeight:800}}>{TI[selType]+" "+((trainingData&&trainingData.title)||TN[selType])}</div>
            <div style={{fontSize:12,color:"var(--text2)"}}>{cycle.name+" · שבוע "+selWeek+(week.peak?" · PEAK WEEK":"")}</div>
          </div>
        </div>

        <div className="date-bar">
          <label>📅 תאריך:</label>
          <input className="date-input" type="date" value={workoutDate} onChange={e=>setWorkoutDate(e.target.value)} />
          <button className="today-btn" onClick={()=>setWorkoutDate(new Date().toISOString().split("T")[0])}>היום</button>
        </div>

        <div className="loc-toggle">
          <button className={"loc-btn"+(loc==="home"?" active":"")} onClick={()=>setLoc("home")}>🧱 קיר</button>
          <button className={"loc-btn"+(loc==="gym"?" active":"")} onClick={()=>setLoc("gym")}>🏋️ סטודיו</button>
        </div>

        <div style={{marginTop:12}}>
          {displayList.map((item, di) => {
            var ex = item.ex;
            var grp = item.added ? "x" : (ex.group || null);
            var showLabel = item.added
              ? (di === 0 || !displayList[di-1].added)
              : (di === 0 || displayList[di-1].added || displayList[di-1].ex.group !== ex.group);
            var lastPerf = getPerfHistory(ex, logs, sessionLogId, 1)[0];
            var lastSummary = lastPerf ? (lastPerf.entry.sets||[]).filter(setHasData).map(fmtSetStr).join(" · ") : "";
            var sets = curSets[item.key] || [];
            return <div key={item.key}>
              {showLabel && grp && <div className="group-label">
                <div className={"group-badge "+(item.added?"d":grp)} style={item.added?{width:"auto",padding:"0 10px",borderRadius:8,fontSize:11}:{}}>{item.added?"נוספו":grp.toUpperCase()}</div>
                <div className="group-text">{item.added?"תרגילים שנוספו באימון":GROUP_NAMES[grp]||""}</div>
                <div className="group-line"></div>
              </div>}
              <div className={"ex-card "+(item.added?"gx":(grp?"g"+grp:""))}>
                <div className="ex-header" onClick={()=>toggleEx(item.key, ex)}>
                  <div className="ex-num">{ex.code||"+"}</div>
                  <div style={{flex:1}}>
                    <div className="ex-name">
                      {ex.name}
                      {ex.variation && <span className="ex-variation">{ex.variation}</span>}
                    </div>
                    <div style={{fontSize:11,color:"var(--text3)",marginTop:2}}>
                      {ex.target && <span>{"יעד: "+ex.target+" "}</span>}
                      {ex.sets && <span>{"· "+ex.sets+" סטים "}</span>}
                      {ex.rir && <span>{"· RIR "+ex.rir+" "}</span>}
                      {ex.measure==="time" && <span style={{color:"var(--yellow)"}}>· ⏱ זמן</span>}
                      {ex.load==="text" && <span style={{color:"var(--orange)"}}>· עומס</span>}
                    </div>
                    {ex.notes && <div style={{fontSize:11,color:"var(--text2)",marginTop:2}}>💬 {ex.notes}</div>}
                    <button className="prev-perf-line" onClick={(e)=>{e.stopPropagation();setPerfModal(ex);}}>
                      📊 {lastSummary ? "פעם קודמת: "+lastSummary : "היסטוריית ביצועים"}
                    </button>
                  </div>
                  <button className="ex-remove" onClick={(e)=>{e.stopPropagation();removeExercise(item);}}>🗑</button>
                  <span className="ex-chevron">{openEx[item.key]?"▴":"▾"}</span>
                </div>
                {openEx[item.key] && <div className="sets-area">
                  <div className="sets-header">
                    <div className="set-label"></div>
                    {ex.load!=="none" && <div style={{flex:1}} className="sets-header-label">{ex.load==="kg"?"משקל":"עומס"}</div>}
                    <div style={{flex:1}} className="sets-header-label">{ex.measure==="time"?"זמן":"חזרות"}</div>
                    <div style={{width:30}}></div>
                  </div>
                  {sets.map((s,si)=>{
                    var lpSet = lastPerf && lastPerf.entry.sets ? lastPerf.entry.sets[si] : null;
                    var lpLoad = lpSet ? (lpSet.load != null ? String(lpSet.load) : (lpSet.weight != null ? String(lpSet.weight) : "")) : "";
                    var lpVal = lpSet ? (lpSet.value != null ? String(lpSet.value) : (lpSet.reps != null ? String(lpSet.reps) : "")) : "";
                    return <div key={si}>
                      <div className="set-row">
                        <div className="set-label">{si+1}</div>
                        {ex.load==="kg" && <input className="set-input" type="number" inputMode="decimal" placeholder={lpLoad||"ק״ג"} value={s.load} onChange={e=>updateSet(item.key,si,"load",e.target.value)} />}
                        {ex.load==="text" && <input className="set-input" type="text" placeholder={lpLoad||"גומיה / עומס"} value={s.load} onChange={e=>updateSet(item.key,si,"load",e.target.value)} />}
                        {ex.measure==="reps"
                          ? <input className="set-input" type="number" inputMode="numeric" placeholder={lpVal||"חז'"} value={s.value} onChange={e=>updateSet(item.key,si,"value",e.target.value)} />
                          : <input className="set-input" type="text" inputMode="numeric" placeholder={lpVal||"0:45"} value={s.value} onChange={e=>updateSet(item.key,si,"value",e.target.value)} />}
                        <button className="set-del" onClick={()=>removeSet(item.key,si)}>✕</button>
                      </div>
                      <div className="set-notes-row">
                        <input className="set-notes" style={{flex:"0 0 52px",textAlign:"center"}} type="number" inputMode="numeric" placeholder={ex.rir?("RIR "+ex.rir):"RIR"} value={s.rir} onChange={e=>updateSet(item.key,si,"rir",e.target.value)} />
                        <input className="set-notes" style={{flex:1}} type="text" placeholder={ex.variation?("וריאציה ("+ex.variation+")"):"וריאציה"} value={s.variation} onChange={e=>updateSet(item.key,si,"variation",e.target.value)} />
                        <input className="set-notes" style={{flex:1.2}} type="text" placeholder="הערות..." value={s.notes} onChange={e=>updateSet(item.key,si,"notes",e.target.value)} />
                      </div>
                    </div>;
                  })}
                  <button className="add-set-btn" onClick={()=>addSet(item.key)}>+ הוסף סט</button>
                </div>}
              </div>
            </div>;
          })}

          <button className="add-ex-btn" onClick={()=>{setAddModal(true);setLibSearch("");}}>➕ הוסף תרגיל לאימון</button>

          {cardioPlan && (cardioPlan.exercises||[]).length > 0 && <div style={{marginTop:14}}>
            <div className="group-label">
              <div className="group-badge" style={{background:"var(--orange)",fontSize:10,width:"auto",padding:"0 10px",borderRadius:8}}>
                {(cardioPlan.type||"tabata").toUpperCase()}
              </div>
              {(cardioPlan.work||cardioPlan.rest) && <div className="group-text">{(cardioPlan.work?"עבודה "+cardioPlan.work:"")+(cardioPlan.rest?" · מנוחה "+cardioPlan.rest:"")}</div>}
              <div className="group-line"></div>
            </div>
            <div className="cardio-ex-list">
              {cardioPlan.exercises.map((exName,i)=>
                <div className="cardio-ex-item" key={i}>
                  <div className="ex-num">{i+1}</div>
                  <div className="ex-name">{exName}</div>
                </div>
              )}
            </div>
            <div style={{padding:"0 16px",marginTop:8,display:"flex",gap:8}}>
              <div className="cardio-time-box">
                <div className="cardio-time-label">⏱ זמן עבודה</div>
                <input className="cardio-time-input" type="text" inputMode="numeric" placeholder={cardioPlan.work||"0:00"} value={cardioData.workTime} onChange={e=>setCardioData(p=>({...p,workTime:e.target.value}))} />
              </div>
              <div className="cardio-time-box">
                <div className="cardio-time-label">😮‍💨 זמן מנוחה</div>
                <input className="cardio-time-input" type="text" inputMode="numeric" placeholder={cardioPlan.rest||"0:00"} value={cardioData.restTime} onChange={e=>setCardioData(p=>({...p,restTime:e.target.value}))} />
              </div>
            </div>
            <div className="cardio-notes-wrap">
              <textarea className="cardio-notes-input" placeholder="הערות קרדיו..." value={cardioData.notes} onChange={e=>setCardioData(p=>({...p,notes:e.target.value}))} />
            </div>
          </div>}
          <div style={{height:70}}></div>
        </div>

        {hasData && <div className="save-bar"><div className="save-bar-inner" style={{display:"flex",alignItems:"center",gap:10}}>
          <div className="save-status" style={{flex:"0 0 auto"}}>
            {saveStatus==="saving" && <span style={{color:"var(--text2)"}}>שומר…</span>}
            {saveStatus==="saved" && <span style={{color:"var(--green)"}}>✓ נשמר</span>}
            {saveStatus==="error" && <span style={{color:"var(--red)"}}>⚠ שגיאת שמירה</span>}
          </div>
          <button className="save-btn" style={{flex:1}} onClick={finishWorkout}>סיום אימון</button>
        </div></div>}
      </div>}

      {/* ===== HISTORY ===== */}
      {tab==="history" && <div>
        <div className="header">
          <img className="logo-img" src="rangeicon.jpg" alt="R" style={{width:34,height:34}} onError={(e)=>{e.target.style.display='none'}} />
          <div className="logo-text" style={{fontSize:22}}>היסטוריה</div>
        </div>
        {!logs.length ? <div className="empty"><div className="empty-icon">📋</div><div>עדיין אין אימונים שמורים</div></div> :
        (() => {
          var grouped = {}, cycleOrder = [];
          logs.forEach(log => {
            var cid = log.cycleId||"unknown";
            if (!grouped[cid]) { grouped[cid] = {name:log.cycleName||cid, weeks:{}}; cycleOrder.push(cid); }
            var wk = log.weekNum||0;
            if (!grouped[cid].weeks[wk]) grouped[cid].weeks[wk] = [];
            grouped[cid].weeks[wk].push(log);
          });
          cycleOrder = [...new Set(cycleOrder)];
          return cycleOrder.map(cid => {
            var cg = grouped[cid];
            var isOpen = openHistCycles[cid];
            var weekKeys = Object.keys(cg.weeks).sort((a,b)=>b-a);
            var totalLogs = weekKeys.reduce((s,w)=>s+cg.weeks[w].length,0);
            return <div className="hist-cycle-group" key={cid}>
              <div className={"hist-cycle-header"+(isOpen?" open":"")} onClick={()=>setOpenHistCycles(p=>({...p,[cid]:!p[cid]}))}>
                <div>
                  <div className="hist-cycle-title">{cg.name}</div>
                  <div className="hist-cycle-meta">{totalLogs+" אימונים · "+weekKeys.length+" שבועות"}</div>
                </div>
                <span className="hist-cycle-chevron">{isOpen?"▾":"◂"}</span>
              </div>
              {isOpen && <div className="hist-cycle-body">
                {weekKeys.map(wk => {
                  var wkey = cid+"_w"+wk;
                  var wOpen = openHistWeeks[wkey];
                  var wlogs = cg.weeks[wk];
                  return <div key={wk}>
                    <div className="hist-week-header" onClick={()=>setOpenHistWeeks(p=>({...p,[wkey]:!p[wkey]}))}>
                      <div className="hist-week-title">{"שבוע "+wk}</div>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <span className="hist-week-count">{wlogs.length+" אימונים"}</span>
                        <span className="hist-cycle-chevron">{wOpen?"▾":"◂"}</span>
                      </div>
                    </div>
                    {wOpen && wlogs.map(log=><div className="hist-log-item" key={log.id}>
                      <div className="hist-log-header">
                        <div>
                          <span className="hist-log-type">{TN[log.type]||log.type}</span>
                          {log.status==="active" && <span className="active-badge">פעיל</span>}
                          <span style={{fontSize:11,color:"var(--text3)",marginRight:8}}>{" · "+(log.location==="gym"?"סטודיו":"קיר")}</span>
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:6}}>
                          <span className="hist-log-date">{log.date+(log.time?" · "+log.time:"")}</span>
                          <button className="hist-log-del" onClick={()=>deleteLog(log.id)}>🗑</button>
                        </div>
                      </div>
                      {renderLogDetail(log)}
                      <button className="reopen-btn" onClick={()=>reopenLog(log)}>✏️ החזר לאימון פעיל</button>
                    </div>)}
                  </div>;
                })}
              </div>}
            </div>;
          });
        })()}
      </div>}

      {/* ===== ADMIN / SETTINGS ===== */}
      {tab==="settings" && <div>
        <div className="header">
          <img className="logo-img" src="rangeicon.jpg" alt="R" style={{width:34,height:34}} onError={(e)=>{e.target.style.display='none'}} />
          <div className="logo-text" style={{fontSize:22}}>{admin ? "ניהול" : "הגדרות"}</div>
        </div>

        <div className="storage-info">
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <img src={user.photoURL} style={{width:32,height:32,borderRadius:"50%"}} onError={e=>{e.target.style.display='none'}} />
            <div>
              <strong>{user.displayName}</strong>
              <div style={{fontSize:11,color:"var(--text3)"}}>{user.email}{admin?" · אדמין":""}</div>
            </div>
          </div>
        </div>

        {admin && !editCycle && <div className="admin-section">
          <div className="admin-card">
            <h3>📤 העלאת סייקל חדש</h3>
            <p>העלו קובץ xlsx בתבנית החדשה. חשוב: מספר סייקל (#N) בתא B2 של גיליון 1, ועמודות סטים/RIR בפורמט טקסט.</p>
            <div className="file-upload">
              <label className={"file-upload-btn"+(uploadFile?" has-file":"")} htmlFor="cycle-file">
                {uploadFile ? ("✅ "+uploadFile.name) : "📁 בחרו קובץ xlsx"}
              </label>
              <input id="cycle-file" type="file" accept=".xlsx,.xls" onChange={e=>{if(e.target.files[0])setUploadFile(e.target.files[0]);}} />
              <button className="upload-submit" onClick={handleUpload} disabled={!uploadFile||uploading}>{uploading?"מעלה...":"העלה סייקל"}</button>
            </div>
          </div>

          <div className="admin-card">
            <div className="admin-collapse-header" onClick={()=>setAdminLibOpen(p=>!p)}>
              <h3>📚 מאגר תרגילים ({lib.length})</h3>
              <span style={{color:"var(--text3)",fontSize:18}}>{adminLibOpen?"▾":"◂"}</span>
            </div>
            {adminLibOpen && <div>
              <button className="add-set-btn" style={{marginTop:10}} onClick={buildLibraryFromCycles}>🔄 בנה/עדכן מאגר מהסייקלים הקיימים</button>
              <input className="user-search" type="text" placeholder="🔍 חיפוש תרגיל..." value={libAdminSearch} onChange={e=>setLibAdminSearch(e.target.value)} />
              {lib
                .filter(e => { var q = normExName(libAdminSearch); return !q || normExName(e.name).indexOf(q) >= 0; })
                .sort((a,b)=>a.name.localeCompare(b.name,"he"))
                .map(e => libEditId === e.id ? (
                  <div className="lib-edit-row" key={e.id}>
                    <div className="lib-edit-inputs">
                      <input className="lib-edit-name" value={libEditForm.name} onChange={ev=>setLibEditForm(p=>({...p,name:ev.target.value}))} />
                    </div>
                    <div style={{display:"flex",gap:6}}>
                      <div style={{flex:1}} className="seg-toggle">
                        <button className={"seg-btn"+(libEditForm.measure==="reps"?" active":"")} onClick={()=>setLibEditForm(p=>({...p,measure:"reps"}))}>חזרות</button>
                        <button className={"seg-btn"+(libEditForm.measure==="time"?" active":"")} onClick={()=>setLibEditForm(p=>({...p,measure:"time"}))}>⏱ זמן</button>
                      </div>
                      <div style={{flex:1.4}} className="seg-toggle">
                        <button className={"seg-btn"+(libEditForm.load==="kg"?" active":"")} onClick={()=>setLibEditForm(p=>({...p,load:"kg"}))}>ק״ג</button>
                        <button className={"seg-btn"+(libEditForm.load==="text"?" active":"")} onClick={()=>setLibEditForm(p=>({...p,load:"text"}))}>עומס</button>
                        <button className={"seg-btn"+(libEditForm.load==="none"?" active":"")} onClick={()=>setLibEditForm(p=>({...p,load:"none"}))}>ללא</button>
                      </div>
                    </div>
                    <div style={{display:"flex",gap:6}}>
                      <button className="today-btn" style={{flex:1}} onClick={saveLibEdit}>💾 שמור</button>
                      <button className="add-set-btn" style={{flex:1,marginTop:0}} onClick={()=>setLibEditId(null)}>ביטול</button>
                    </div>
                  </div>
                ) : (
                  <div className="lib-row" key={e.id} onClick={()=>{setLibEditId(e.id);setLibEditForm({name:e.name,measure:e.measure||"reps",load:e.load||"kg"});}}>
                    <div className="lib-row-name">{e.name}</div>
                    <span className={"badge-mini"+(e.measure==="time"?" time":"")}>{e.measure==="time"?"⏱ זמן":"חזרות"}</span>
                    <span className={"badge-mini"+(e.load==="kg"?" kg":e.load==="text"?" loadtxt":"")}>{e.load==="kg"?"ק״ג":e.load==="text"?"עומס":"—"}</span>
                    <button className="editor-ex-del" onClick={ev=>{ev.stopPropagation();deleteLibEntry(e.id);}}>🗑</button>
                  </div>
                ))}
            </div>}
          </div>

          <div className="admin-card">
            <div className="admin-collapse-header" onClick={()=>setAdminCyclesOpen(p=>!p)}>
              <h3>📊 סייקלים קיימים ({cycles.length})</h3>
              <span style={{color:"var(--text3)",fontSize:18}}>{adminCyclesOpen?"▾":"◂"}</span>
            </div>
            {adminCyclesOpen && <React.Fragment>
              <p style={{fontSize:11,color:"var(--text3)",margin:"8px 0"}}>לחצו על סייקל כדי לערוך תרגילים</p>
              {cycles.length ? cycles.map((c,ci)=><div className="cycle-card" key={c.id} style={{margin:"8px 0",cursor:"pointer",opacity:ci===0?1:ci===1?.75:.5}} onClick={()=>startEditCycle(c)}>
                <div>
                  <div className="cycle-name">{c.name} ✏️{ci===0 && <span style={{fontSize:10,color:"var(--green)",marginRight:6}}>● נוכחי</span>}</div>
                  <div className="cycle-meta">{(c.weeks||[]).length+" שבועות"}</div>
                </div>
                <button className="cycle-del" onClick={(e)=>{e.stopPropagation();deleteCycle(c.id);}}>🗑</button>
              </div>) : <p>אין סייקלים</p>}
            </React.Fragment>}
          </div>

          <div className="admin-card">
            <div className="admin-collapse-header" onClick={()=>setAdminUsersOpen(p=>!p)}>
              <h3>👥 משתמשים ({allUsers.length})</h3>
              <span style={{color:"var(--text3)",fontSize:18}}>{adminUsersOpen?"▾":"◂"}</span>
            </div>
            {adminUsersOpen && <React.Fragment>
              <input className="user-search" type="text" placeholder="🔍 חיפוש לפי שם או מייל..." value={userSearch} onChange={e=>setUserSearch(e.target.value)} />
              {allUsers.filter(u=>{
                var q = userSearch.trim().toLowerCase();
                if (!q) return true;
                return (u.displayName||"").toLowerCase().includes(q) || (u.email||"").toLowerCase().includes(q);
              }).map(u=><div className="user-row" key={u.uid}>
                <img className="user-avatar" src={u.photoURL} onError={e=>{e.target.style.background="var(--bg4)"}} />
                <div className="user-info">
                  <div className="user-name">{u.displayName||"—"}</div>
                  <div className="user-email">{u.email}</div>
                </div>
                <span className={"user-badge "+(u.role||"trainee")}>{u.role==="admin"?"אדמין":"מתאמן/ת"}</span>
              </div>)}
            </React.Fragment>}
          </div>
        </div>}

        {/* CYCLE EDITOR */}
        {admin && editCycle && <div>
          <div style={{padding:"8px 16px",display:"flex",alignItems:"center",gap:10}}>
            <button className="back-btn" onClick={()=>setEditCycle(null)}>→</button>
            <div style={{flex:1}}>
              <div style={{fontSize:16,fontWeight:800}}>✏️ עריכת {editCycle.name}</div>
              <div style={{fontSize:11,color:"var(--text3)"}}>{(editCycle.weeks||[]).length} שבועות</div>
            </div>
          </div>

          {(editCycle.weeks||[]).map((w,wi) => <div className="editor-week" key={wi}>
            <div className="editor-week-title" onClick={()=>setEditOpenWeeks(p=>({...p,[wi]:!p[wi]}))}>
              {editOpenWeeks[wi] ? "▾" : "◂"}
              {w.peak && <span className="peak-badge">PEAK</span>}
              {"שבוע "+w.weekNum}
            </div>
            {editOpenWeeks[wi] && [1,2,3].map(tNum => {
              var td = (w.trainings||{})[tNum];
              if (!td) return null;
              var exArr = td.exercises||[];
              return <div className="editor-type" key={tNum}>
                <div className="editor-type-header">{TI["training"+tNum]+" "+(td.title||TN["training"+tNum])+" ("+exArr.length+")"}</div>
                {exArr.map((ex,ei) => <div className="editor-ex" key={ei}>
                  <span style={{fontSize:11,color:"var(--accent)",minWidth:28}}>{ex.code}</span>
                  <input className="editor-ex-input" value={ex.name} placeholder="שם ראשי" onChange={e=>{
                    setEditCycle(p=>{var n=JSON.parse(JSON.stringify(p));n.weeks[wi].trainings[tNum].exercises[ei].name=e.target.value;return n;});
                  }} />
                  <input className="editor-ex-input" style={{flex:.8}} value={ex.variation||""} placeholder="וריאציה" onChange={e=>{
                    setEditCycle(p=>{var n=JSON.parse(JSON.stringify(p));n.weeks[wi].trainings[tNum].exercises[ei].variation=e.target.value;return n;});
                  }} />
                  <button className="editor-ex-del" onClick={()=>{
                    setEditCycle(p=>{var n=JSON.parse(JSON.stringify(p));n.weeks[wi].trainings[tNum].exercises.splice(ei,1);return n;});
                  }}>✕</button>
                </div>)}
                {td.cardio && (td.cardio.exercises||[]).length > 0 && <div style={{padding:"6px 14px",borderTop:"1px solid var(--bg4)"}}>
                  <div style={{fontSize:11,color:"var(--orange)",fontWeight:700}}>{(td.cardio.type||"tabata").toUpperCase()}</div>
                  {td.cardio.exercises.map((exName,ei)=><div style={{fontSize:12,color:"var(--text2)",paddingRight:8,marginTop:2}} key={ei}>{(ei+1)+". "+exName}</div>)}
                </div>}
              </div>;
            })}
          </div>)}

          <button className="editor-save" onClick={saveEditCycle} disabled={saving}>
            {saving ? "שומר..." : "💾 שמור שינויים"}
          </button>
          <button className="add-set-btn" style={{margin:"8px 16px",width:"calc(100% - 32px)"}} onClick={()=>setEditCycle(null)}>ביטול</button>
        </div>}

        <div className="storage-info" style={{marginTop:16}}>
          <strong>{logs.length}</strong> אימונים שמורים · <strong>{lib.length}</strong> תרגילים במאגר<br/>
          הנתונים נשמרים ב-Firebase (ענן) ונגישים מכל מכשיר.
        </div>

        <button className="add-set-btn" style={{margin:"12px 16px",width:"calc(100% - 32px)"}} onClick={signOut}>🚪 התנתקו</button>
      </div>}

      {/* ===== DASHBOARD (admin only) ===== */}
      {tab==="dashboard" && admin && <div>
        <div className="header">
          {dashUser && <button className="back-btn" onClick={()=>{setDashUser(null);setDashLogs([]);}}>→</button>}
          <img className="logo-img" src="rangeicon.jpg" alt="R" style={{width:34,height:34}} onError={(e)=>{e.target.style.display='none'}} />
          <div className="logo-text" style={{fontSize:22}}>{dashUser ? dashUser.displayName : "דשבורד מאמן"}</div>
        </div>

        {!dashUser ? <div>
          <div className="section-title">{"מתאמנים ("+allUsers.filter(u=>u.role!=="admin").length+")"}</div>
          {allUsers.filter(u=>u.role!=="admin").map(u=><div className="dash-user-card" key={u.uid} onClick={()=>viewUserLogs(u)}>
            <img className="dash-user-avatar" src={u.photoURL} onError={e=>{e.target.style.background="var(--bg4)"}} />
            <div className="dash-user-info">
              <div className="dash-user-name">{u.displayName||"—"}</div>
              <div className="dash-user-meta">{u.email}</div>
            </div>
            <div className="dash-user-count">{(userLogCounts[u.uid]||0)+" אימונים"}</div>
          </div>)}
          {allUsers.filter(u=>u.role==="admin").length > 0 && <div>
            <div className="section-title">אדמינים</div>
            {allUsers.filter(u=>u.role==="admin").map(u=><div className="dash-user-card" key={u.uid} onClick={()=>viewUserLogs(u)}>
              <img className="dash-user-avatar" src={u.photoURL} onError={e=>{e.target.style.background="var(--bg4)"}} />
              <div className="dash-user-info">
                <div className="dash-user-name">{u.displayName||"—"}</div>
                <div className="dash-user-meta">{u.email}</div>
              </div>
              <div className="dash-user-count">{(userLogCounts[u.uid]||0)+" אימונים"}</div>
            </div>)}
          </div>}
        </div> :

        <div>
          {dashLoading ? <div className="empty"><div className="spinner"></div><div style={{marginTop:12}}>טוען אימונים...</div></div> :
          !dashLogs.length ? <div className="empty"><div className="empty-icon">📋</div><div>אין אימונים שמורים</div></div> :
          <div>
            <div style={{padding:"8px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontSize:13,color:"var(--text2)"}}>{dashLogs.length+" אימונים"}</div>
              <button className="today-btn" onClick={exportUserCsv}>📥 ייצוא CSV</button>
            </div>
            {dashLogs.map(log=><div className="hist-card" key={log.id}>
              <div className="hist-date">{log.date+(log.time?" · "+log.time:"")}{log.status==="active" && <span className="active-badge">פעיל</span>}</div>
              <div className="hist-info">{(TN[log.type]||log.type)+" · "+(log.cycleName||"")+" · שבוע "+(log.weekNum||"")+" · "+(log.location==="gym"?"סטודיו":"קיר")}</div>
              {renderLogDetail(log)}
            </div>)}
          </div>}
        </div>}
      </div>}

      {/* ===== NAV ===== */}
      <div className="nav"><div className="nav-inner">
        <button className={"nav-btn"+(tab==="home"?" active":"")} onClick={()=>{setTab("home");setSelType(null);resetSession();}}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>אימון
        </button>
        <button className={"nav-btn"+(tab==="history"?" active":"")} onClick={()=>setTab("history")}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>היסטוריה
        </button>
        {admin && <button className={"nav-btn"+(tab==="dashboard"?" active":"")} onClick={()=>{setTab("dashboard");setDashUser(null);}}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4-4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>דשבורד
        </button>}
        <button className={"nav-btn"+(tab==="settings"?" active":"")} onClick={()=>setTab("settings")}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>{admin?"ניהול":"הגדרות"}
        </button>
      </div></div>
    </div>
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));

</script>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function() {
    navigator.serviceWorker.register("sw.js").catch(function(e){console.log("SW failed:",e)});
  });
}
</script>
</body>
</html>
